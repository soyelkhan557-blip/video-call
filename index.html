<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soyel Call Pro - Pro Messenger</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-image: url('bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-color: #0f172a; }
        .dark-overlay { background: rgba(0, 0, 0, 0.6); height: 100vh; width: 100%; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; }
        video { width: 100%; height: 100vh; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 160px; border-radius: 20px; border: 2px solid #fff; z-index: 10; object-fit: cover; }
        .contact-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .contact-item:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .user-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #6366f1; }
        
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; background-image: url('bg.jpg'); background-size: cover; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.6); }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 14px; }
        .bubble-me { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: rgba(255,255,255,0.15); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .btn-action { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <div class="dark-overlay">
        <!-- ১. লগইন পেজ -->
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-12">
                <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" class="w-24 h-24 mb-6 mx-auto">
                <h1 class="text-3xl font-bold text-white mb-2 uppercase italic">Soyel Pro</h1>
                <button onclick="login()" class="bg-white text-indigo-600 px-12 py-4 rounded-full font-bold shadow-xl mt-6">গুগল লগইন</button>
            </div>
        </div>

        <!-- ২. ড্যাশবোর্ড (Contact List) -->
        <div id="dashboard" class="hidden flex-1 flex flex-col p-6">
            <header class="flex justify-between items-center text-white mb-8">
                <div class="flex items-center gap-3">
                    <img id="my-photo" src="" class="user-img">
                    <div>
                        <h2 id="my-name" class="font-bold text-lg leading-none">Soyel Khan</h2>
                        <span class="text-[10px] text-green-400 font-bold uppercase">Online</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="opacity-40"><span class="material-icons-round text-3xl">logout</span></button>
            </header>

            <div class="space-y-6 overflow-y-auto flex-1">
                <!-- আইডি বসানোর অপশন -->
                <div class="flex gap-2">
                    <input id="target-id" type="text" placeholder="নতুন আইডি দিন" class="flex-1 p-4 glass text-white text-xs outline-none border-none">
                    <button onclick="addNewContact()" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold">যোগ করুন</button>
                </div>

                <h3 class="text-white/50 text-[10px] font-bold uppercase tracking-widest">আপনার বন্ধুরা</h3>
                <div id="contact-list">
                    <!-- বন্ধুদের তালিকা এখানে আসবে -->
                    <p class="text-white/20 text-center py-10 text-xs italic">এখনো কোনো বন্ধু যোগ করা হয়নি</p>
                </div>
            </div>
            
            <div class="mt-4 glass p-4 text-center">
                <p class="text-white/40 text-[9px] uppercase font-bold mb-1">আপনার আইডি (বন্ধুকে পাঠান)</p>
                <code id="my-id-display" class="text-indigo-400 font-mono text-[10px] break-all">...</code>
            </div>
        </div>
    </div>

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-5 bg-black/50 backdrop-blur-xl flex items-center gap-3 text-white border-b border-white/10">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" src="" class="w-10 h-10 rounded-full border border-indigo-500">
            <div class="flex-1">
                <h4 id="chat-user-name" class="font-bold text-sm leading-none">বন্ধুর নাম</h4>
                <span class="text-[9px] text-green-400 font-bold">সক্রিয়</span>
            </div>
            <button onclick="startCallFromChat()" class="p-2 bg-indigo-600 rounded-full"><span class="material-icons-round">videocam</span></button>
        </div>
        <div id="messages"></div>
        <div class="p-4 bg-black/40 backdrop-blur-xl flex gap-3 items-center">
            <button onclick="document.getElementById('file-input').click()" class="text-white/50"><span class="material-icons-round">add_circle</span></button>
            <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." class="flex-1 p-4 bg-white/10 rounded-2xl text-white outline-none border border-white/5">
            <button onclick="sendMsg()" class="bg-indigo-600 text-white p-4 rounded-2xl"><span class="material-icons-round">send</span></button>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile()">
        </div>
    </div>

    <!-- কল স্ক্রিন UI -->
    <div id="incoming-ui" class="hidden fixed inset-0 z-[3000] bg-indigo-900 flex flex-col items-center justify-center text-white text-center">
        <div class="w-28 h-28 rounded-full bg-white/10 border-4 border-white/20 p-1 mb-6 animate-bounce">
            <img id="caller-img" src="" class="w-full h-full rounded-full object-cover">
        </div>
        <h2 id="caller-name" class="text-2xl font-bold mb-2">ইনকামিং কল...</h2>
        <div class="flex gap-12 mt-20">
            <button onclick="acceptCall()" class="w-20 h-20 bg-green-500 rounded-full shadow-lg"><span class="material-icons-round text-4xl">videocam</span></button>
            <button onclick="location.reload()" class="w-20 h-20 bg-red-500 rounded-full shadow-lg"><span class="material-icons-round text-4xl">call_end</span></button>
        </div>
    </div>

    <div id="video-page" class="hidden fixed inset-0 bg-black z-[2500]">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-6">
            <button onclick="location.reload()" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center shadow-2xl"><span class="material-icons-round text-4xl text-white">call_end</span></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY",
            authDomain: "video-3d955.firebaseapp.com",
            projectId: "video-3d955",
            storageBucket: "video-3d955.firebasestorage.app",
            messagingSenderId: "1016513647050",
            appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });
        let localStream, currentChatId, fileData = null;
        const ringtone = document.getElementById('ringtone'), dialtone = document.getElementById('dialtone');

        function startAudio() { ringtone.play().then(()=>ringtone.pause()); dialtone.play().then(()=>dialtone.pause()); }

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display').innerText = user.uid;
                document.getElementById('my-name').innerText = user.displayName;
                document.getElementById('my-photo').src = user.photoURL;
                
                // নিজের প্রোফাইল সেভ করা
                await db.collection('users').doc(user.uid).set({
                    name: user.displayName,
                    photo: user.photoURL,
                    uid: user.uid
                });
                
                listenForCalls(user.uid);
                loadContacts(user.uid);
            }
        });

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        // কন্টাক্ট লিস্ট লোড করা
        function loadContacts(myUid) {
            db.collection('users').doc(myUid).collection('contacts').onSnapshot(snap => {
                const list = document.getElementById('contact-list');
                list.innerHTML = '';
                snap.forEach(async doc => {
                    const friendUid = doc.id;
                    const friendData = (await db.collection('users').doc(friendUid).get()).data();
                    if(friendData) {
                        list.innerHTML += `
                            <div class="contact-item" onclick="openChat('${friendUid}', '${friendData.name}', '${friendData.photo}')">
                                <img src="${friendData.photo}" class="user-img">
                                <div class="flex-1">
                                    <h4 class="text-white font-bold text-sm">${friendData.name}</h4>
                                    <p class="text-white/40 text-[10px] truncate">চ্যাট করতে ট্যাপ করুন</p>
                                </div>
                                <span class="material-icons-round text-indigo-400">chevron_right</span>
                            </div>`;
                    }
                });
            });
        }

        async function addNewContact() {
            const id = document.getElementById('target-id').value;
            if(!id || id === auth.currentUser.uid) return alert("সঠিক আইডি দিন");
            await db.collection('users').doc(auth.currentUser.uid).collection('contacts').doc(id).set({ added: true });
            await db.collection('users').doc(id).collection('contacts').doc(auth.currentUser.uid).set({ added: true });
            document.getElementById('target-id').value = '';
        }

        function openChat(id, name, photo) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-img').src = photo;
            document.getElementById('chat-window').style.display = 'flex';
            listenForMsg(id);
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        async function startCallFromChat() {
            if(!currentChatId) return;
            dialtone.play();
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
            
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(currentChatId).collection('offerCandidates').add(e.candidate.toJSON());
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            await callDoc.set({ offer: { sdp: offer.sdp, type: offer.type }, callerName: auth.currentUser.displayName, callerPhoto: auth.currentUser.photoURL });
            
            callDoc.onSnapshot(s => {
                if (s.data()?.answer && !pc.currentRemoteDescription) {
                    dialtone.pause();
                    document.getElementById('video-page').classList.remove('hidden');
                    pc.setRemoteDescription(new RTCSessionDescription(s.data().answer));
                }
            });
            callDoc.collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                const data = s.data();
                if (data?.offer && !pc.currentRemoteDescription) {
                    currentChatId = uid;
                    document.getElementById('caller-name').innerText = data.callerName;
                    document.getElementById('caller-img').src = data.callerPhoto;
                    ringtone.play();
                    document.getElementById('incoming-ui').classList.remove('hidden');
                }
            });
        }

        async function acceptCall() {
            ringtone.pause();
            document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('video-page').classList.remove('hidden');
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(currentChatId).collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            await callDoc.update({ answer: { sdp: answer.sdp, type: answer.type } });
            callDoc.collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function handleFile() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onload = e => { fileData = e.target.result; sendMsg(); };
            reader.readAsDataURL(file);
        }

        async function sendMsg() {
            const text = document.getElementById('msg-input').value;
            if(!text && !fileData) return;
            await db.collection('chats').doc(getChatId()).collection('messages').add({
                text: text || "", media: fileData || null, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msg-input').value = ''; fileData = null;
        }

        function getChatId() {
            return auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
        }

        function listenForMsg(friendId) {
            db.collection('chats').doc(getChatId()).collection('messages').orderBy('ts').onSnapshot(s => {
                const div = document.getElementById('messages'); div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data(); const isMe = data.sender === auth.currentUser.uid;
                    let mediaHTML = data.media ? `<img src="${data.media}" class="media-file" onclick="window.open('${data.media}')">` : '';
                    div.innerHTML += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}">${mediaHTML}${data.text}</div>`;
                });
                div.scrollTop = div.scrollHeight;
            });
        }
    </script>
</body>
</html>
