<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soyel Call Pro - Mega Update</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-image: url('bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-color: #1e293b; }
        .dark-overlay { background: rgba(0, 0, 0, 0.45); height: 100vh; width: 100%; position: relative; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; }
        video { width: 100%; height: 100vh; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 110px; height: 160px; border-radius: 20px; border: 2px solid #fff; z-index: 10; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-round { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; }
        .ui-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        
        /* চ্যাট এরিয়া */
        #chat-section { position: fixed; bottom: 0; left: 0; right: 0; height: 60%; transform: translateY(100%); transition: 0.5s ease-in-out; z-index: 2000; display: flex; flex-direction: column; border-radius: 40px 40px 0 0; }
        #chat-section.open { transform: translateY(0); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 12px 18px; border-radius: 20px; max-width: 75%; font-size: 14px; position: relative; }
        .msg-me { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-them { background: rgba(255,255,255,0.2); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .media-preview { max-width: 100%; border-radius: 15px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body onclick="unmuteAudio()">

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <div class="dark-overlay">
        <!-- ১. লগইন পেজ -->
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-12">
                <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" class="w-20 h-20 mb-6 mx-auto animate-bounce">
                <h1 class="text-3xl font-bold text-white mb-2 tracking-tighter">SOYEL CALL PRO</h1>
                <p class="text-white/50 text-xs mb-8 uppercase font-bold">Video • Chat • Media</p>
                <button onclick="login()" class="bg-white text-indigo-600 px-12 py-4 rounded-full font-bold shadow-xl active:scale-90 transition-all">গুগল দিয়ে লগইন</button>
            </div>
        </div>

        <!-- ২. ড্যাশবোর্ড -->
        <div id="dashboard" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
            <header class="flex justify-between items-center text-white mb-6">
                <div class="flex items-center gap-3">
                    <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" width="35">
                    <h2 class="font-bold text-xl italic">Soyel Call</h2>
                </div>
                <button onclick="location.reload()" class="opacity-40"><span class="material-icons-round text-3xl">logout</span></button>
            </header>

            <div class="flex-1 flex flex-col justify-center items-center">
                <div class="glass p-8 w-full text-center mb-8">
                    <p class="text-white/40 text-[10px] font-bold uppercase mb-2">আপনার কলিং আইডি</p>
                    <p id="my-id" class="text-white font-mono font-bold break-all text-xs border border-white/10 p-3 rounded-xl bg-black/20">লোড হচ্ছে...</p>
                    <button onclick="navigator.clipboard.writeText(document.getElementById('my-id').innerText); alert('ID কপি হয়েছে!')" class="mt-4 text-indigo-400 text-xs font-bold uppercase">কপি করুন</button>
                </div>

                <div class="w-full space-y-4">
                    <input id="friend-id" type="text" placeholder="বন্ধুর আইডি এখানে দিন" class="w-full p-6 glass text-white placeholder-white/30 outline-none border-none focus:ring-2 ring-white/20">
                    <button onclick="startCall()" class="w-full bg-white text-indigo-600 py-6 rounded-[30px] font-bold shadow-2xl text-lg active:scale-95 transition-all">কল শুরু করুন</button>
                    <button onclick="openChat()" class="w-full bg-indigo-600/50 text-white py-4 rounded-[25px] font-bold border border-white/20">মেসেঞ্জারে যান</button>
                </div>
            </div>
            <p class="text-center text-[10px] text-white/30 mt-6 font-bold uppercase">Developed by Soyel Khan • V6.0</p>
        </div>
    </div>

    <!-- ৩. কল উইন্ডো (Calling/Incoming) -->
    <div id="calling-ui" class="hidden ui-overlay"><div class="dark-overlay absolute inset-0 flex flex-col items-center justify-center">
        <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mb-6 animate-pulse border-4 border-white/20"><span class="material-icons-round text-5xl text-white">call_made</span></div>
        <h2 class="text-3xl font-bold text-white mb-2">কল যাচ্ছে...</h2>
        <button onclick="location.reload()" class="btn-round bg-red-500 mt-20"><span class="material-icons-round text-4xl">close</span></button>
    </div></div>

    <div id="incoming-ui" class="hidden ui-overlay"><div class="dark-overlay absolute inset-0 flex flex-col items-center justify-center">
        <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mb-6 animate-bounce border-4 border-white/20"><span class="material-icons-round text-5xl text-white">call_received</span></div>
        <h2 class="text-3xl font-bold text-white mb-12">ভিডিও কল আসছে...</h2>
        <div class="flex gap-10">
            <button onclick="acceptCall()" class="btn-round bg-green-500 shadow-xl"><span class="material-icons-round text-4xl">videocam</span></button>
            <button onclick="location.reload()" class="btn-round bg-red-500 shadow-xl"><span class="material-icons-round text-4xl">call_end</span></button>
        </div>
    </div></div>

    <!-- ৪. ভিডিও স্ক্রিন -->
    <div id="video-page" class="hidden fixed inset-0 bg-black z-[200]">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-6 z-[300]">
            <button onclick="openChat()" class="btn-round bg-white/20 backdrop-blur-md border border-white/20"><span class="material-icons-round text-3xl">chat</span></button>
            <button onclick="location.reload()" class="btn-round bg-red-500 shadow-2xl"><span class="material-icons-round text-4xl">call_end</span></button>
            <button onclick="toggleCamera()" class="btn-round bg-white/20 backdrop-blur-md border border-white/20"><span class="material-icons-round text-3xl">flip_camera_ios</span></button>
        </div>
    </div>

    <!-- ৫. মেসেঞ্জার ও মিডিয়া সেকশন -->
    <div id="chat-section" class="glass">
        <div class="p-4 border-b border-white/10 flex justify-between items-center text-white">
            <span class="font-bold">মেসেঞ্জার প্রো</span>
            <button onclick="closeChat()" class="p-2"><span class="material-icons-round">expand_more</span></button>
        </div>
        <div id="messages"></div>
        <div class="p-4 bg-black/20 backdrop-blur-xl flex flex-col gap-3">
            <div id="media-preview-container" class="hidden"></div>
            <div class="flex gap-2 items-center">
                <button onclick="document.getElementById('media-input').click()" class="text-white/60"><span class="material-icons-round">image</span></button>
                <input id="chat-input" type="text" placeholder="মেসেজ লিখুন..." class="flex-1 p-4 bg-white/10 rounded-2xl text-white outline-none border border-white/10">
                <button onclick="sendMsg()" class="bg-indigo-600 text-white p-4 rounded-2xl"><span class="material-icons-round">send</span></button>
            </div>
            <input type="file" id="media-input" accept="image/*,video/*" class="hidden" onchange="previewMedia()">
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY",
            authDomain: "video-3d955.firebaseapp.com",
            projectId: "video-3d955",
            storageBucket: "video-3d955.firebasestorage.app",
            messagingSenderId: "1016513647050",
            appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });
        let localStream, callId, selectedMedia = null;
        const ringtone = document.getElementById('ringtone'), dialtone = document.getElementById('dialtone');

        function unmuteAudio() { ringtone.play().then(() => ringtone.pause()); dialtone.play().then(() => dialtone.pause()); }
        auth.onAuthStateChanged(user => {
            if (user) { document.getElementById('login-page').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('my-id').innerText = user.uid; listenForCalls(user.uid); }
        });
        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function openChat() { document.getElementById('chat-section').classList.add('open'); }
        function closeChat() { document.getElementById('chat-section').classList.remove('open'); }

        async function setupMedia() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
        }

        async function startCall() {
            const fId = document.getElementById('friend-id').value;
            if(!fId) return alert("আইডি দিন");
            callId = fId; dialtone.play(); document.getElementById('calling-ui').classList.remove('hidden');
            await setupMedia();
            listenForMsg(fId);
            const callDoc = db.collection('calls').doc(fId);
            pc.onicecandidate = e => e.candidate && callDoc.collection('offerCandidates').add(e.candidate.toJSON());
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            await callDoc.set({ offer: { sdp: offer.sdp, type: offer.type } });
            callDoc.onSnapshot(s => {
                if (s.data()?.answer && !pc.currentRemoteDescription) {
                    dialtone.pause(); document.getElementById('calling-ui').classList.add('hidden'); document.getElementById('video-page').classList.remove('hidden');
                    pc.setRemoteDescription(new RTCSessionDescription(s.data().answer));
                }
            });
            callDoc.collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                if (s.data()?.offer && !pc.currentRemoteDescription) { callId = uid; ringtone.play(); document.getElementById('incoming-ui').classList.remove('hidden'); listenForMsg(uid); }
            });
        }

        async function acceptCall() {
            ringtone.pause(); document.getElementById('incoming-ui').classList.add('hidden'); document.getElementById('video-page').classList.remove('hidden');
            await setupMedia();
            const callDoc = db.collection('calls').doc(callId);
            pc.onicecandidate = e => e.candidate && callDoc.collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            await callDoc.update({ answer: { sdp: answer.sdp, type: answer.type } });
            callDoc.collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        // মেসেজ ও ফটো পাঠানোর লজিক
        function previewMedia() {
            const file = document.getElementById('media-input').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                selectedMedia = e.target.result;
                document.getElementById('media-preview-container').innerHTML = `<img src="${selectedMedia}" class="h-20 rounded-lg">`;
                document.getElementById('media-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function sendMsg() {
            const text = document.getElementById('chat-input').value;
            const targetId = callId || document.getElementById('friend-id').value;
            if((!text && !selectedMedia) || !targetId) return;
            await db.collection('calls').doc(targetId).collection('messages').add({
                text: text || "", media: selectedMedia || null, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('chat-input').value = '';
            selectedMedia = null;
            document.getElementById('media-preview-container').classList.add('hidden');
        }

        function listenForMsg(id) {
            db.collection('calls').doc(id).collection('messages').orderBy('ts').onSnapshot(s => {
                const div = document.getElementById('messages'); div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data(); const isMe = data.sender === auth.currentUser.uid;
                    let mediaHTML = data.media ? `<img src="${data.media}" class="media-preview">` : '';
                    div.innerHTML += `<div class="msg-bubble ${isMe ? 'msg-me' : 'msg-them'}">${mediaHTML}${data.text}</div>`;
                });
                div.scrollTop = div.scrollHeight;
            });
        }
    </script>
</body>
</html>
