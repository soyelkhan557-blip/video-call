<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Pro Messenger</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        
        :root {
            --bg-dark: #0b141a;
            --wa-green: #00a884;
            --bubble-me: #005c4b;
            --bubble-them: #202c33;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--bg-dark); 
            height: 100vh; 
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent; 
        }

        /* ব্যাকগ্রাউন্ড ফটো সিস্টেম */
        .bg-app { 
            background-image: url('bg.jpg'); /* আপনার ফটো ফাইল */
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            height: 100%;
            width: 100%;
        }

        .dark-overlay { 
            background: rgba(0, 0, 0, 0.75); /* ফটোর উপর ডার্ক লেয়ার যাতে মেসেজ দেখা যায় */
            height: 100%; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
        }

        /* নোটিফিকেশন বার */
        #custom-toast {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            z-index: 9999;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 90%;
            max-width: 400px;
        }
        #custom-toast.show { transform: translateX(-50%) translateY(20px); }
        .toast-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* চ্যাট স্ক্রিন */
        #chat-window { 
            position: fixed; 
            inset: 0; 
            z-index: 2000; 
            display: none; 
            flex-direction: column; 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center;
        }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: rgba(11, 20, 26, 0.85); }
        
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; color: white; position: relative; }
        .bubble-me { background: var(--bubble-me); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: var(--bubble-them); align-self: flex-start; border-bottom-left-radius: 4px; }

        .media-msg { max-width: 100%; border-radius: 12px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* ইনপুট এরিয়া */
        .bottom-bar { padding: 10px 10px 30px 10px; background: var(--bg-dark); display: flex; align-items: center; gap: 10px; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 30px; display: flex; align-items: center; padding: 0 12px; }
        #msg-input { background: transparent; border: none; outline: none; color: white; flex: 1; padding: 12px 5px; }

        #rec-timer { display: none; color: white; font-weight: bold; flex: 1; align-items: center; gap: 10px; }
        .recording-dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .action-btn { background: var(--wa-green); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; items: center; justify-content: center; }

        /* কল স্ক্রিন */
        .call-ui { position: fixed; inset: 0; z-index: 5000; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .call-avatar { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--wa-green); padding: 5px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 168, 132, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0); } }
    </style>
</head>
<body onclick="enableAudio()" class="bg-app">

    <div class="dark-overlay">
        <!-- প্রফেশনাল নোটিফিকেশন বার -->
        <div id="custom-toast">
            <div class="toast-content">
                <span class="material-icons-round text-yellow-400">notifications_active</span>
                <span id="toast-text">...</span>
            </div>
        </div>

        <!-- লগইন পেজ -->
        <div id="login-screen" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <h1 class="text-4xl font-bold text-white mb-10 italic">Soyel Pro</h1>
            <div class="w-full max-w-xs space-y-4">
                <input id="login-phone" placeholder="মোবাইল নম্বর" class="w-full p-4 rounded-2xl bg-white/10 text-white outline-none">
                <input id="login-pass" type="password" placeholder="পাসওয়ার্ড" class="w-full p-4 rounded-2xl bg-white/10 text-white outline-none">
                <button onclick="authAction()" class="w-full bg-indigo-600 p-4 rounded-2xl text-white font-bold">লগইন / সাইন আপ</button>
            </div>
        </div>

        <!-- ড্যাশবোর্ড -->
        <div id="dashboard" class="hidden h-screen flex flex-col p-6 text-white">
            <div class="flex justify-between items-center mb-8">
                <img id="my-photo" class="w-12 h-12 rounded-full border-2 border-indigo-500" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <button onclick="showMyId()" class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">MY ID</button>
            </div>
            <div class="flex gap-2 mb-6">
                <input id="friend-id" placeholder="বন্ধুর আইডি দিন" class="flex-1 bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                <button onclick="addFriend()" class="bg-indigo-600 px-6 rounded-2xl font-bold">যোগ</button>
            </div>
            <div id="friend-list" class="flex-1 overflow-y-auto space-y-3"></div>
        </div>
    </div>

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-4 flex items-center gap-4 text-white bg-[#202c33] shadow-lg">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" class="w-10 h-10 rounded-full">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4><span class="text-green-500 text-[10px] font-bold">অনলাইন</span></div>
            <button onclick="startCall()"><span class="material-icons-round text-indigo-400 text-3xl">videocam</span></button>
        </div>
        
        <div id="messages"></div>

        <div class="bottom-bar">
            <div class="input-wrapper">
                <button onclick="triggerGallery()"><span class="material-icons-round text-gray-400">add</span></button>
                <div id="rec-timer"><div class="recording-dot"></div><span id="timer-text">0:00</span></div>
                <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." autocomplete="off">
            </div>
            <button id="mic-btn" class="action-btn" onclick="handleVoice()"><span class="material-icons-round">mic</span></button>
            <button id="send-btn" class="action-btn hidden" onclick="sendTextMsg()"><span class="material-icons-round">send</span></button>
        </div>
        <input type="file" id="gallery-input" class="hidden" accept="image/*,video/*" onchange="uploadMedia()">
    </div>

    <!-- কল স্ক্রিন -->
    <div id="call-ui" class="hidden call-ui">
        <img id="call-img" class="call-avatar">
        <h2 id="call-name" class="text-2xl font-bold">...</h2>
        <p id="call-stat" class="mt-4 text-indigo-400 font-bold uppercase tracking-widest text-xs">Calling...</p>
        <div class="mt-20 flex gap-12">
            <button onclick="hangup()" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center"><span class="material-icons-round text-4xl">call_end</span></button>
            <button id="answer-btn" onclick="answerCall()" class="hidden w-20 h-20 bg-green-500 rounded-full flex items-center justify-center"><span class="material-icons-round text-4xl">videocam</span></button>
        </div>
    </div>

    <!-- অডিও এলিমেন্ট -->
    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let currentChatId, mediaRecorder, chunks = [], recInt, isRec = false, pc;
        const rt = document.getElementById('ringtone'), dt = document.getElementById('dialtone');

        function enableAudio() { rt.play().then(()=>rt.pause()); dt.play().then(()=>dt.pause()); }

        function showToast(msg) {
            const t = document.getElementById('custom-toast');
            document.getElementById('toast-text').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function authAction() {
            const phone = document.getElementById('login-phone').value.trim();
            const pass = document.getElementById('login-pass').value;
            if(!phone || pass.length < 6) return showToast("সঠিক নম্বর ও ৬ অক্ষরের পাসওয়ার্ড দিন");
            const email = phone + "@soyel.com";
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch { try { await auth.createUserWithEmailAndPassword(email, pass); } catch(e) { showToast(e.message); } }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display').innerText = user.uid;
                db.collection('users').doc(user.uid).set({ uid: user.uid, name: user.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });
                loadFriends(); listenForCalls();
            }
        });

        function loadFriends() {
            db.collection('users').doc(auth.currentUser.uid).collection('friends').onSnapshot(snap => {
                const list = document.getElementById('friend-list'); list.innerHTML = '';
                snap.forEach(async doc => {
                    const u = (await db.collection('users').doc(doc.id).get()).data();
                    if(u) {
                        const d = document.createElement('div');
                        d.className = "flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5";
                        d.innerHTML = `<img src="${u.photo}" class="w-12 h-12 rounded-full border border-indigo-500"><div class="font-bold flex-1 text-white">${u.name}</div>`;
                        d.onclick = () => openChat(u.uid, u.name, u.photo);
                        list.appendChild(d);
                    }
                });
            });
        }

        async function addFriend() {
            const id = document.getElementById('friend-id').value.trim();
            if(id && id !== auth.currentUser.uid) {
                await db.collection('users').doc(auth.currentUser.uid).collection('friends').doc(id).set({added: true});
                showToast("বন্ধু যুক্ত হয়েছে!");
                document.getElementById('friend-id').value = '';
            }
        }

        function openChat(id, name, img) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-img').src = img;
            document.getElementById('chat-window').style.display = 'flex';
            listenMessages();
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function listenMessages() {
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            db.collection('chats').doc(cid).collection('messages').orderBy('ts').onSnapshot(snap => {
                const mDiv = document.getElementById('messages'); mDiv.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data(), isMe = data.sender === auth.currentUser.uid;
                    const b = document.createElement('div');
                    b.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                    if(data.type === 'text') b.innerText = data.content;
                    else if(data.type === 'image') b.innerHTML = `<img src="${data.content}" class="media-msg">`;
                    else if(data.type === 'video') b.innerHTML = `<video src="${data.content}" controls class="media-msg"></video>`;
                    else if(data.type === 'voice') b.innerHTML = `<audio src="${data.content}" controls style="filter: invert(1); height: 35px; width: 180px;"></audio>`;
                    b.oncontextmenu = (e) => { e.preventDefault(); if(confirm("ডিলিট করবেন?")) doc.ref.delete(); };
                    mDiv.appendChild(b);
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
        }

        async function saveMsg(type, content) {
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            await db.collection('chats').doc(cid).collection('messages').add({
                sender: auth.currentUser.uid, type, content, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function sendTextMsg() {
            const val = document.getElementById('msg-input').value;
            if(val) { saveMsg('text', val); document.getElementById('msg-input').value = ''; updateIcons(); }
        }

        function triggerGallery() { document.getElementById('gallery-input').click(); }
        function uploadMedia() {
            const file = document.getElementById('gallery-input').files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = (e) => {
                const type = file.type.startsWith('image/') ? 'image' : 'video';
                if(e.target.result.length > 1048576) return showToast("ফাইল অনেক বড়! ছোট ফাইল দিন।");
                saveMsg(type, e.target.result);
            };
            r.readAsDataURL(file);
        }

        async function handleVoice() {
            if(!isRec) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (e) => saveMsg('voice', e.target.result);
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                isRec = true;
                document.getElementById('rec-timer').style.display = 'flex';
                document.getElementById('msg-input').style.display = 'none';
                let s = 0; recInt = setInterval(() => { s++; document.getElementById('timer-text').innerText = `0:${s<10?'0':''}${s}`; }, 1000);
                document.getElementById('mic-btn').innerHTML = `<span class="material-icons-round">stop</span>`;
            } else {
                mediaRecorder.stop();
                isRec = false;
                document.getElementById('rec-timer').style.display = 'none';
                document.getElementById('msg-input').style.display = 'block';
                clearInterval(recInt);
                document.getElementById('mic-btn').innerHTML = `<span class="material-icons-round">mic</span>`;
            }
        }

        async function startCall() {
            dt.play();
            document.getElementById('call-name').innerText = document.getElementById('chat-user-name').innerText;
            document.getElementById('call-img').src = document.getElementById('chat-user-img').src;
            document.getElementById('call-ui').classList.remove('hidden');
            await db.collection('calls').doc(currentChatId).set({ status: 'ringing', from: auth.currentUser.uid, name: auth.currentUser.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });
        }

        function listenForCalls() {
            db.collection('calls').doc(auth.currentUser.uid).onSnapshot(s => {
                const d = s.data();
                if(d?.status === 'ringing') {
                    rt.play();
                    document.getElementById('call-name').innerText = d.name;
                    document.getElementById('call-img').src = d.photo;
                    document.getElementById('call-ui').classList.remove('hidden');
                    document.getElementById('answer-btn').classList.remove('hidden');
                }
                if(!s.exists) hangup();
            });
        }

        function hangup() {
            rt.pause(); dt.pause();
            db.collection('calls').doc(auth.currentUser.uid).delete();
            if(currentChatId) db.collection('calls').doc(currentChatId).delete();
            document.getElementById('call-ui').classList.add('hidden');
        }

        function showMyId() { showToast("আপনার আইডি কপি হয়েছে!"); navigator.clipboard.writeText(auth.currentUser.uid); }

        document.getElementById('msg-input').oninput = updateIcons;
        function updateIcons() {
            const v = document.getElementById('msg-input').value;
            if(v.trim()) { document.getElementById('mic-btn').classList.add('hidden'); document.getElementById('send-btn').classList.remove('hidden'); }
            else { document.getElementById('mic-btn').classList.remove('hidden'); document.getElementById('send-btn').classList.add('hidden'); }
        }
    </script>
</body>
</html>
