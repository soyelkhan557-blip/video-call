<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Pro Messenger</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-color: #0f172a; height: 100vh; }
        .bg-app { background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        .dark-overlay { background: rgba(0, 0, 0, 0.65); height: 100%; width: 100%; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 25px; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 20px; border: 2px solid #fff; z-index: 10; object-fit: cover; }
        .contact-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 22px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        
        /* চ্যাট উইন্ডো ফিক্স */
        #chat-window { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.7); }
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 85%; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .bubble-me { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: rgba(255,255,255,0.15); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* নিচের ইনপুট এরিয়া ফিক্স */
        .chat-input-bar { padding: 15px 15px 30px 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); }
        .input-bg { background: rgba(255,255,255,0.1); border-radius: 30px; padding: 5px 10px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }
        input#msg-input { background: transparent; border: none; outline: none; color: white; padding: 12px; flex: 1; font-size: 15px; }
        .btn-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-send { background: #4f46e5; color: white; }
        .btn-mic { background: rgba(255,255,255,0.1); color: white; }
        .btn-mic.recording { background: #ef4444; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .top-id-btn { background: #4f46e5; padding: 8px 18px; border-radius: 12px; color: white; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body onclick="startAudio()" class="bg-app">

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <div class="dark-overlay">
        <!-- লগইন -->
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-12">
                <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" class="w-24 h-24 mb-6 mx-auto">
                <h1 class="text-3xl font-bold text-white mb-8 italic tracking-tighter">SOYEL PRO</h1>
                <button onclick="login()" class="bg-white text-indigo-600 px-12 py-4 rounded-full font-bold shadow-xl">গুগল দিয়ে প্রবেশ</button>
            </div>
        </div>

        <!-- ড্যাশবোর্ড -->
        <div id="dashboard" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
            <header class="flex justify-between items-center text-white mb-10">
                <div class="flex items-center gap-3">
                    <img id="my-photo" src="" class="w-11 h-11 rounded-full border-2 border-indigo-400 shadow-lg">
                    <h2 id="my-name" class="font-bold text-lg leading-none">Soyel</h2>
                </div>
                <button onclick="showIdModal()" class="top-id-btn shadow-lg">MY ID</button>
            </header>

            <div class="space-y-6 overflow-y-auto flex-1">
                <div class="flex gap-2">
                    <input id="target-id" type="text" placeholder="আইডি দিন" class="flex-1 p-4 glass text-white text-xs outline-none border-none">
                    <button onclick="addNewContact()" class="bg-indigo-600 text-white px-5 rounded-2xl font-bold text-xs shadow-lg">যোগ</button>
                </div>
                <h3 class="text-white/40 text-[10px] font-bold uppercase tracking-widest ml-1">বন্ধুদের তালিকা</h3>
                <div id="contact-list" class="pb-20"></div>
            </div>
        </div>
    </div>

    <!-- চ্যাট উইন্ডো (এখানেই ফিক্স করা হয়েছে) -->
    <div id="chat-window">
        <div class="p-5 bg-black/70 backdrop-blur-xl flex items-center gap-3 text-white border-b border-white/10">
            <button onclick="closeChat()" class="p-2"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" src="" class="w-10 h-10 rounded-full border border-indigo-500">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4></div>
            <button onclick="startCallFromChat()" class="btn-circle bg-indigo-600 shadow-lg"><span class="material-icons-round">videocam</span></button>
        </div>
        
        <div id="messages"></div>
        
        <!-- ফিক্স করা ইনপুট এরিয়া -->
        <div class="chat-input-bar">
            <div id="rec-status" class="hidden text-red-500 text-[10px] font-bold uppercase px-4 mb-2">রেকর্ডিং হচ্ছে...</div>
            <div class="input-bg">
                <button onclick="document.getElementById('file-input').click()" class="text-white/50 p-2"><span class="material-icons-round text-2xl">add_circle</span></button>
                <input id="msg-input" type="text" placeholder="লিখুন..." autocomplete="off">
                
                <button id="mic-btn" onclick="toggleRecording()" class="btn-circle btn-mic">
                    <span id="mic-icon" class="material-icons-round">mic</span>
                </button>

                <button onclick="sendMsg()" class="btn-circle btn-send shadow-lg">
                    <span class="material-icons-round">send</span>
                </button>
            </div>
            <input type="file" id="file-input" class="hidden" onchange="handleFile()">
        </div>
    </div>

    <!-- ইনকামিং কল স্ক্রিন -->
    <div id="incoming-ui" class="hidden fixed inset-0 z-[3000] bg-indigo-950 flex flex-col items-center justify-center text-white text-center">
        <div class="w-28 h-28 rounded-full border-4 border-white/20 mb-6 animate-bounce overflow-hidden shadow-2xl">
            <img id="caller-img" src="" class="w-full h-full object-cover">
        </div>
        <h2 id="caller-name" class="text-2xl font-bold mb-10">ভিডিও কল আসছে...</h2>
        <div class="flex gap-10">
            <button onclick="acceptCall()" class="w-20 h-20 bg-green-500 rounded-full shadow-2xl flex items-center justify-center"><span class="material-icons-round text-4xl">videocam</span></button>
            <button onclick="rejectCall()" class="w-20 h-20 bg-red-500 rounded-full shadow-2xl flex items-center justify-center"><span class="material-icons-round text-4xl">call_end</span></button>
        </div>
    </div>

    <!-- কল হওয়ার স্ক্রিন -->
    <div id="calling-ui" class="hidden fixed inset-0 z-[3000] bg-black/80 flex flex-col items-center justify-center text-white">
        <div class="w-24 h-24 bg-indigo-500 rounded-full flex items-center justify-center mb-6 animate-pulse shadow-2xl"><span class="material-icons-round text-5xl">call_made</span></div>
        <h2 class="text-2xl font-bold">কল যাচ্ছে...</h2>
        <button onclick="location.reload()" class="mt-20 bg-red-500 px-10 py-4 rounded-full font-bold shadow-lg">কেটে দিন</button>
    </div>

    <!-- ভিডিও কল পেজ -->
    <div id="video-page" class="hidden fixed inset-0 bg-black z-[2500]">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center">
            <button onclick="location.reload()" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center shadow-2xl border-4 border-white/10"><span class="material-icons-round text-4xl text-white">call_end</span></button>
        </div>
    </div>

    <!-- আইডি মডাল -->
    <div id="id-modal" class="hidden fixed inset-0 z-[5000] bg-black/90 flex items-center justify-center p-6" onclick="closeIdModal()">
        <div class="glass p-8 w-full max-w-sm text-center text-white" onclick="event.stopPropagation()">
            <p class="text-[10px] uppercase font-bold opacity-60 mb-2">আপনার আইডি</p>
            <p id="my-id-display" class="font-mono text-xs break-all bg-black/40 p-5 rounded-2xl border border-white/10 mb-6 font-bold tracking-tight">লোড হচ্ছে...</p>
            <button onclick="copyMyID()" class="w-full bg-white text-indigo-600 py-4 rounded-2xl font-bold shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span class="material-icons-round text-sm">content_copy</span> কপি করুন
            </button>
            <button onclick="closeIdModal()" class="mt-8 text-xs font-bold opacity-40 uppercase tracking-widest">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY",
            authDomain: "video-3d955.firebaseapp.com",
            projectId: "video-3d955",
            storageBucket: "video-3d955.firebasestorage.app",
            messagingSenderId: "1016513647050",
            appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc = null, localStream, currentChatId, fileData = null;
        let mediaRecorder, audioChunks = [], isRecording = false;
        const ringtone = document.getElementById('ringtone'), dialtone = document.getElementById('dialtone');

        function startAudio() { ringtone.play().then(()=>ringtone.pause()); dialtone.play().then(()=>dialtone.pause()); }

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display').innerText = user.uid;
                document.getElementById('my-name').innerText = user.displayName;
                document.getElementById('my-photo').src = user.photoURL;
                await db.collection('users').doc(user.uid).set({ name: user.displayName, photo: user.photoURL, uid: user.uid });
                listenForCalls(user.uid);
                loadContacts(user.uid);
            }
        });

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function showIdModal() { document.getElementById('id-modal').classList.remove('hidden'); }
        function closeIdModal() { document.getElementById('id-modal').classList.add('hidden'); }
        function copyMyID() { navigator.clipboard.writeText(document.getElementById('my-id-display').innerText); alert("আইডি কপি হয়েছে!"); }

        function loadContacts(myUid) {
            db.collection('users').doc(myUid).collection('contacts').onSnapshot(snap => {
                const list = document.getElementById('contact-list'); list.innerHTML = '';
                snap.forEach(async doc => {
                    const fUid = doc.id;
                    const fData = (await db.collection('users').doc(fUid).get()).data();
                    if(fData) {
                        list.innerHTML += `<div class="contact-item" onclick="openChat('${fUid}', '${fData.name}', '${fData.photo}')"><img src="${fData.photo}" class="w-12 h-12 rounded-full border border-indigo-400"><div class="flex-1"><h4 class="text-white font-bold text-sm">${fData.name}</h4><p class="text-white/30 text-[10px]">চ্যাট করতে ক্লিক করুন</p></div><span class="material-icons-round text-indigo-400">chevron_right</span></div>`;
                    }
                });
            });
        }

        async function addNewContact() {
            const id = document.getElementById('target-id').value.trim();
            if(!id || id === auth.currentUser.uid) return alert("সঠিক আইডি দিন");
            await db.collection('users').doc(auth.currentUser.uid).collection('contacts').doc(id).set({ added: true });
            await db.collection('users').doc(id).collection('contacts').doc(auth.currentUser.uid).set({ added: true });
            document.getElementById('target-id').value = '';
        }

        function openChat(id, name, photo) { currentChatId = id; document.getElementById('chat-user-name').innerText = name; document.getElementById('chat-user-img').src = photo; document.getElementById('chat-window').style.display = 'flex'; listenForMsg(id); }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        async function toggleRecording() {
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start(); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = e => sendMsg(e.target.result);
                    reader.readAsDataURL(audioBlob);
                };
                isRecording = true;
                document.getElementById('mic-btn').classList.add('recording');
                document.getElementById('mic-icon').innerText = 'stop';
                document.getElementById('rec-status').classList.remove('hidden');
            } else {
                mediaRecorder.stop(); isRecording = false;
                document.getElementById('mic-btn').classList.remove('recording');
                document.getElementById('mic-icon').innerText = 'mic';
                document.getElementById('rec-status').classList.add('hidden');
            }
        }

        async function sendMsg(voiceData = null) {
            const text = document.getElementById('msg-input').value;
            if(!text && !fileData && !voiceData) return;
            const chatId = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            await db.collection('chats').doc(chatId).collection('messages').add({
                text: text || "", media: fileData || null, voice: voiceData || null, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msg-input').value = ''; fileData = null;
        }

        function listenForMsg(friendId) {
            const chatId = auth.currentUser.uid < friendId ? auth.currentUser.uid + "_" + friendId : friendId + "_" + auth.currentUser.uid;
            db.collection('chats').doc(chatId).collection('messages').orderBy('ts').onSnapshot(s => {
                const div = document.getElementById('messages'); div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data(); const isMe = data.sender === auth.currentUser.uid;
                    let mediaHTML = data.media ? `<img src="${data.media}" class="w-full rounded-lg mb-2">` : '';
                    let voiceHTML = data.voice ? `<audio controls src="${data.voice}" class="w-full h-10 mt-2"></audio>` : '';
                    div.innerHTML += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}">${mediaHTML}${voiceHTML}${data.text}</div>`;
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function initRTC() {
            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
        }

        async function startCallFromChat() {
            dialtone.play(); document.getElementById('calling-ui').classList.remove('hidden');
            await initRTC();
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(currentChatId).collection('offerCandidates').add(e.candidate.toJSON());
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            await callDoc.set({ offer: { sdp: offer.sdp, type: offer.type }, callerName: auth.currentUser.displayName, callerPhoto: auth.currentUser.photoURL, ts: Date.now() });
            callDoc.onSnapshot(s => { if (s.data()?.answer && !pc.currentRemoteDescription) { dialtone.pause(); document.getElementById('calling-ui').classList.add('hidden'); document.getElementById('video-page').classList.remove('hidden'); pc.setRemoteDescription(new RTCSessionDescription(s.data().answer)); } });
            db.collection('calls').doc(currentChatId).collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                const data = s.data();
                if (data?.offer && !pc.currentRemoteDescription) {
                    currentChatId = uid;
                    document.getElementById('caller-name').innerText = data.callerName;
                    document.getElementById('caller-img').src = data.callerPhoto;
                    ringtone.play(); document.getElementById('incoming-ui').classList.remove('hidden');
                }
            });
        }

        async function acceptCall() {
            ringtone.pause(); document.getElementById('incoming-ui').classList.add('hidden'); document.getElementById('video-page').classList.remove('hidden');
            await initRTC();
            const callDoc = db.collection('calls').doc(auth.currentUser.uid);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(auth.currentUser.uid).collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            await callDoc.update({ answer: { sdp: answer.sdp, type: answer.type } });
            db.collection('calls').doc(auth.currentUser.uid).collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function rejectCall() { ringtone.pause(); db.collection('calls').doc(auth.currentUser.uid).delete(); document.getElementById('incoming-ui').classList.add('hidden'); }
        function handleFile() { const file = document.getElementById('file-input').files[0]; const reader = new FileReader(); reader.onload = e => { fileData = e.target.result; sendMsg(); }; reader.readAsDataURL(file); }
    </script>
</body>
</html>
