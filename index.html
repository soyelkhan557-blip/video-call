<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soyel Pro - Fingerprint Lock</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-image: url('bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-color: #0f172a; }
        .dark-overlay { background: rgba(0, 0, 0, 0.6); height: 100vh; width: 100%; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; }
        
        /* ফিঙ্গারপ্রিন্ট লক স্ক্রিন */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; background-image: url('bg.jpg'); background-size: cover; }
        .lock-content { background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .fingerprint-icon { font-size: 80px; color: #6366f1; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        video { width: 100%; height: 100vh; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 160px; border-radius: 20px; border: 2px solid #fff; z-index: 10; object-fit: cover; }
        .contact-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 22px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); }
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; background-image: url('bg.jpg'); background-size: cover; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.7); }
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 80%; font-size: 14px; }
        .bubble-me { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: rgba(255,255,255,0.15); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <!-- ফিঙ্গারপ্রিন্ট লক স্ক্রিন -->
    <div id="lock-screen">
        <div class="lock-content">
            <span class="material-icons-round fingerprint-icon">fingerprint</span>
            <h2 class="text-2xl font-bold mb-2">Soyel Pro Locked</h2>
            <p class="text-white/50 mb-10 text-sm">অ্যাপটি খুলতে আপনার ফিঙ্গারপ্রিন্ট দিন</p>
            <button onclick="verifyFingerprint()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold shadow-lg">আনলক করুন</button>
        </div>
    </div>

    <div class="dark-overlay">
        <!-- লগইন -->
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-12">
                <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" class="w-24 h-24 mb-6 mx-auto">
                <h1 class="text-3xl font-bold text-white mb-2 italic">SOYEL PRO</h1>
                <button onclick="login()" class="bg-white text-indigo-600 px-12 py-4 rounded-full font-bold shadow-xl mt-6">গুগল দিয়ে প্রবেশ</button>
            </div>
        </div>

        <!-- ড্যাশবোর্ড -->
        <div id="dashboard" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
            <header class="flex justify-between items-center text-white mb-6">
                <div class="flex items-center gap-3">
                    <img id="my-photo" src="" class="w-10 h-10 rounded-full border-2 border-indigo-400">
                    <h2 id="my-name" class="font-bold text-lg">Soyel Khan</h2>
                </div>
                <button onclick="showIdModal()" class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold">ID</button>
            </header>

            <div id="setup-lock-btn" class="hidden mb-6 bg-yellow-500/20 border border-yellow-500/50 p-4 rounded-2xl text-center">
                <p class="text-yellow-500 text-[11px] font-bold mb-2">আপনার ফোন নিরাপদ করতে লক সেট করুন</p>
                <button onclick="registerFingerprint()" class="bg-yellow-500 text-black px-6 py-2 rounded-full text-[10px] font-bold">লক চালু করুন</button>
            </div>

            <div class="space-y-6 overflow-y-auto flex-1">
                <div class="flex gap-2">
                    <input id="target-id" type="text" placeholder="বন্ধুর আইডি দিন" class="flex-1 p-4 glass text-white text-xs outline-none border-none">
                    <button onclick="addNewContact()" class="bg-indigo-600 text-white px-5 rounded-2xl font-bold text-xs">যোগ</button>
                </div>
                <h3 class="text-white/50 text-[10px] font-bold uppercase tracking-widest">বন্ধু তালিকা</h3>
                <div id="contact-list"></div>
            </div>
        </div>
    </div>

    <!-- আইডি মডাল -->
    <div id="id-modal" class="hidden fixed inset-0 z-[5000] bg-black/80 flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center text-white">
            <p class="text-[10px] uppercase font-bold opacity-50 mb-2">আপনার আইডি</p>
            <p id="my-id-display" class="font-mono text-xs break-all bg-black/40 p-4 rounded-xl mb-6">লোড হচ্ছে...</p>
            <button onclick="copyID()" class="w-full bg-white text-indigo-600 py-3 rounded-xl font-bold mb-3">কপি করুন</button>
            <button onclick="document.getElementById('id-modal').classList.add('hidden')" class="text-xs opacity-50">বন্ধ করুন</button>
        </div>
    </div>

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-5 bg-black/60 backdrop-blur-xl flex items-center gap-3 text-white border-b border-white/10">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" src="" class="w-10 h-10 rounded-full">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4></div>
            <button onclick="startCallFromChat()" class="p-2 bg-indigo-600 rounded-full shadow-lg"><span class="material-icons-round">videocam</span></button>
        </div>
        <div id="messages"></div>
        <div class="p-4 bg-black/40 backdrop-blur-xl flex gap-3 items-center">
            <button onclick="document.getElementById('file-input').click()" class="text-white/50"><span class="material-icons-round">add_circle</span></button>
            <input id="msg-input" type="text" placeholder="লিখুন..." class="flex-1 p-4 bg-white/10 rounded-2xl text-white outline-none border border-white/5">
            <button onclick="sendMsg()" class="bg-indigo-600 text-white p-4 rounded-2xl"><span class="material-icons-round">send</span></button>
            <input type="file" id="file-input" class="hidden" onchange="handleFile()">
        </div>
    </div>

    <!-- ইনকামিং কল -->
    <div id="incoming-ui" class="hidden fixed inset-0 z-[3000] bg-indigo-900 flex flex-col items-center justify-center text-white text-center">
        <div class="w-28 h-28 rounded-full bg-white/10 border-4 border-white/20 p-1 mb-6">
            <img id="caller-img" src="" class="w-full h-full rounded-full object-cover">
        </div>
        <h2 id="caller-name" class="text-2xl font-bold">ভিডিও কল আসছে...</h2>
        <div class="flex gap-12 mt-20">
            <button onclick="acceptCall()" class="w-20 h-20 bg-green-500 rounded-full shadow-lg"><span class="material-icons-round text-4xl">videocam</span></button>
            <button onclick="location.reload()" class="w-20 h-20 bg-red-500 rounded-full shadow-lg"><span class="material-icons-round text-4xl">call_end</span></button>
        </div>
    </div>

    <div id="video-page" class="hidden fixed inset-0 bg-black z-[2500]">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center"><button onclick="location.reload()" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center"><span class="material-icons-round text-4xl text-white">call_end</span></button></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY",
            authDomain: "video-3d955.firebaseapp.com",
            projectId: "video-3d955",
            storageBucket: "video-3d955.firebasestorage.app",
            messagingSenderId: "1016513647050",
            appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });
        let localStream, currentChatId, fileData = null;
        const ringtone = document.getElementById('ringtone'), dialtone = document.getElementById('dialtone');

        function startAudio() { ringtone.play().then(()=>ringtone.pause()); dialtone.play().then(()=>dialtone.pause()); }

        // --- ফিঙ্গারপ্রিন্ট লজিক ---
        async function registerFingerprint() {
            try {
                const credential = await navigator.credentials.create({
                    publicKey: {
                        challenge: new Uint8Array([1,2,3,4]),
                        rp: { name: "Soyel Pro" },
                        user: { id: new Uint8Array([1]), name: "user", displayName: "User" },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { authenticatorAttachment: "platform" }
                    }
                });
                if(credential) {
                    localStorage.setItem('lock_enabled', 'true');
                    alert("ফিঙ্গারপ্রিন্ট লক চালু হয়েছে!");
                    document.getElementById('setup-lock-btn').style.display = 'none';
                }
            } catch(e) { alert("আপনার ফোনে ফিঙ্গারপ্রিন্ট সাপোর্ট করে না বা কোনো সমস্যা হয়েছে।"); }
        }

        async function verifyFingerprint() {
            try {
                const assertion = await navigator.credentials.get({
                    publicKey: { challenge: new Uint8Array([1,2,3,4]), timeout: 60000 }
                });
                if(assertion) { document.getElementById('lock-screen').style.display = 'none'; }
            } catch(e) { alert("ফিঙ্গারপ্রিন্ট মেলেনি। আবার চেষ্টা করুন।"); }
        }

        function checkLock() {
            if(localStorage.getItem('lock_enabled') === 'true') {
                document.getElementById('lock-screen').style.display = 'flex';
                verifyFingerprint();
            }
        }
        // -----------------------

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display').innerText = user.uid;
                document.getElementById('my-name').innerText = user.displayName;
                document.getElementById('my-photo').src = user.photoURL;
                
                if(!localStorage.getItem('lock_enabled')) {
                    document.getElementById('setup-lock-btn').classList.remove('hidden');
                }
                
                checkLock();
                await db.collection('users').doc(user.uid).set({ name: user.displayName, photo: user.photoURL, uid: user.uid });
                listenForCalls(user.uid);
                loadContacts(user.uid);
            }
        });

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function showIdModal() { document.getElementById('id-modal').classList.remove('hidden'); }
        function copyID() { navigator.clipboard.writeText(document.getElementById('my-id-display').innerText); alert("আইডি কপি হয়েছে!"); }

        function loadContacts(myUid) {
            db.collection('users').doc(myUid).collection('contacts').onSnapshot(snap => {
                const list = document.getElementById('contact-list');
                list.innerHTML = '';
                snap.forEach(async doc => {
                    const friendUid = doc.id;
                    const friendData = (await db.collection('users').doc(friendUid).get()).data();
                    if(friendData) {
                        list.innerHTML += `
                            <div class="contact-item" onclick="openChat('${friendUid}', '${friendData.name}', '${friendData.photo}')">
                                <img src="${friendData.photo}" class="w-12 h-12 rounded-full border border-white/20">
                                <div class="flex-1"><h4 class="text-white font-bold text-sm">${friendData.name}</h4><p class="text-white/30 text-[10px]">চ্যাট করতে ক্লিক করুন</p></div>
                                <span class="material-icons-round text-indigo-400">chevron_right</span>
                            </div>`;
                    }
                });
            });
        }

        async function addNewContact() {
            const id = document.getElementById('target-id').value;
            if(!id || id === auth.currentUser.uid) return alert("সঠিক আইডি দিন");
            await db.collection('users').doc(auth.currentUser.uid).collection('contacts').doc(id).set({ added: true });
            await db.collection('users').doc(id).collection('contacts').doc(auth.currentUser.uid).set({ added: true });
            document.getElementById('target-id').value = '';
        }

        function openChat(id, name, photo) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-img').src = photo;
            document.getElementById('chat-window').style.display = 'flex';
            listenForMsg(id);
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        async function sendMsg() {
            const text = document.getElementById('msg-input').value;
            if(!text && !fileData) return;
            const chatId = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            await db.collection('chats').doc(chatId).collection('messages').add({
                text: text || "", media: fileData || null, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msg-input').value = ''; fileData = null;
        }

        function listenForMsg(friendId) {
            const chatId = auth.currentUser.uid < friendId ? auth.currentUser.uid + "_" + friendId : friendId + "_" + auth.currentUser.uid;
            db.collection('chats').doc(chatId).collection('messages').orderBy('ts').onSnapshot(s => {
                const div = document.getElementById('messages'); div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data(); const isMe = data.sender === auth.currentUser.uid;
                    let mediaHTML = data.media ? `<img src="${data.media}" class="w-full rounded-lg mb-2">` : '';
                    div.innerHTML += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}">${mediaHTML}${data.text}</div>`;
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function startCallFromChat() {
            dialtone.play();
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(currentChatId).collection('offerCandidates').add(e.candidate.toJSON());
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            await callDoc.set({ offer: { sdp: offer.sdp, type: offer.type }, callerName: auth.currentUser.displayName, callerPhoto: auth.currentUser.photoURL, ts: Date.now() });
            callDoc.onSnapshot(s => { if (s.data()?.answer && !pc.currentRemoteDescription) { dialtone.pause(); document.getElementById('video-page').classList.remove('hidden'); pc.setRemoteDescription(new RTCSessionDescription(s.data().answer)); } });
            callDoc.collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                const data = s.data();
                if (data?.offer && !pc.currentRemoteDescription) {
                    if(Date.now() - data.ts > 60000) return db.collection('calls').doc(uid).delete();
                    currentChatId = uid;
                    document.getElementById('caller-name').innerText = data.callerName;
                    document.getElementById('caller-img').src = data.callerPhoto;
                    ringtone.play(); document.getElementById('incoming-ui').classList.remove('hidden');
                }
            });
        }

        async function acceptCall() {
            ringtone.pause(); document.getElementById('incoming-ui').classList.add('hidden'); document.getElementById('video-page').classList.remove('hidden');
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(currentChatId).collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            await callDoc.update({ answer: { sdp: answer.sdp, type: answer.type } });
            callDoc.collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function handleFile() { const file = document.getElementById('file-input').files[0]; const reader = new FileReader(); reader.onload = e => { fileData = e.target.result; sendMsg(); }; reader.readAsDataURL(file); }
    </script>
</body>
</html>
