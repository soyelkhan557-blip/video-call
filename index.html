<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soyel Call Pro - Sound Fix</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-image: url('bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-color: #1e293b; }
        .dark-overlay { background: rgba(0, 0, 0, 0.4); height: 100vh; width: 100%; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; }
        video { width: 100%; height: 100vh; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 140px; border-radius: 20px; border: 2px solid #fff; z-index: 10; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-round { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .ui-overlay { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; padding: 20px; text-align: center; background-image: url('bg.jpg'); background-size: cover; background-position: center; }
    </style>
</head>
<body onclick="setupAudio()"> <!-- স্ক্রিনে টাচ করলেই সাউন্ড সিস্টেম রেডি হবে -->

    <!-- অডিও রিংটোন -->
    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <div class="dark-overlay">
        
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-10 flex flex-col items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" class="w-20 h-20 mb-6">
                <h1 class="text-3xl font-bold text-white mb-2 uppercase">Soyel Call Pro</h1>
                <button onclick="login()" class="bg-white text-indigo-600 px-10 py-4 rounded-full font-bold shadow-xl mt-8">গুগল দিয়ে শুরু</button>
            </div>
            <p class="mt-12 text-[10px] text-white/50 font-bold uppercase">Developed by Soyel Khan</p>
        </div>

        <div id="dashboard" class="hidden h-screen flex flex-col">
            <header class="p-6 flex justify-between items-center text-white">
                <h2 class="font-bold text-xl uppercase italic">Soyel Call</h2>
                <button onclick="location.reload()" class="opacity-50"><span class="material-icons-round">logout</span></button>
            </header>
            <div class="p-8 flex-1 flex flex-col justify-center text-center">
                <p class="text-white bg-red-500/50 p-2 rounded-lg text-[10px] mb-4 font-bold">সাউন্ড অন করতে স্ক্রিনের যেকোনো জায়গায় একবার টাচ করুন</p>
                <div class="glass p-8 mb-8">
                    <p class="text-white/60 text-[10px] font-bold mb-2 uppercase">আপনার কলিং আইডি</p>
                    <p id="my-id" class="text-white font-mono font-bold break-all text-sm">লোড হচ্ছে...</p>
                </div>
                <div class="space-y-4">
                    <input id="friend-id" type="text" placeholder="বন্ধুর আইডি এখানে দিন" class="w-full p-5 glass text-white placeholder-white/50 outline-none border-none">
                    <button onclick="startCall()" class="w-full bg-white text-indigo-600 py-6 rounded-[30px] font-bold shadow-2xl text-lg">কল শুরু করুন</button>
                </div>
            </div>
        </div>

    </div>

    <!-- ইনকামিং কল উইন্ডো -->
    <div id="incoming-ui" class="hidden ui-overlay">
        <div class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center">
            <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mb-6 animate-bounce">
                <span class="material-icons-round text-5xl text-white">call_received</span>
            </div>
            <h2 class="text-3xl font-bold text-white mb-12">ভিডিও কল আসছে...</h2>
            <div class="flex gap-10">
                <button onclick="acceptCall()" class="btn-round bg-green-500"><span class="material-icons-round text-3xl">videocam</span></button>
                <button onclick="location.reload()" class="btn-round bg-red-500"><span class="material-icons-round text-3xl">call_end</span></button>
            </div>
        </div>
    </div>

    <!-- কল যাওয়ার উইন্ডো -->
    <div id="calling-ui" class="hidden ui-overlay">
        <div class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center">
            <div class="w-24 h-24 bg-indigo-500 rounded-full flex items-center justify-center mb-6 animate-pulse">
                <span class="material-icons-round text-5xl text-white">call_made</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">কল যাচ্ছে...</h2>
            <button onclick="location.reload()" class="btn-round bg-red-500 mt-10"><span class="material-icons-round text-3xl">close</span></button>
        </div>
    </div>

    <div id="video-page" class="hidden fixed inset-0 bg-black z-[200]">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center z-[300]">
            <button onclick="location.reload()" class="btn-round bg-red-500 shadow-2xl"><span class="material-icons-round text-4xl">call_end</span></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY",
            authDomain: "video-3d955.firebaseapp.com",
            projectId: "video-3d955",
            storageBucket: "video-3d955.firebasestorage.app",
            messagingSenderId: "1016513647050",
            appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });
        let localStream, callId;
        const ringtone = document.getElementById('ringtone');
        const dialtone = document.getElementById('dialtone');

        // অডিও চালু করার জন্য বিশেষ ফাংশন
        function setupAudio() {
            ringtone.play().then(() => { ringtone.pause(); }).catch(()=>{});
            dialtone.play().then(() => { dialtone.pause(); }).catch(()=>{});
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id').innerText = user.uid;
                listenForCalls(user.uid);
            }
        });

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        async function startCall() {
            const fId = document.getElementById('friend-id').value;
            if(!fId) return alert("আইডি দিন");
            callId = fId;
            document.getElementById('calling-ui').classList.remove('hidden');
            dialtone.play();

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;

            const callDoc = db.collection('calls').doc(fId);
            pc.onicecandidate = e => e.candidate && callDoc.collection('offerCandidates').add(e.candidate.toJSON());
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await callDoc.set({ offer: { sdp: offer.sdp, type: offer.type } });

            callDoc.onSnapshot(s => {
                if (s.data()?.answer && !pc.currentRemoteDescription) {
                    dialtone.pause();
                    document.getElementById('calling-ui').classList.add('hidden');
                    document.getElementById('video-page').classList.remove('hidden');
                    pc.setRemoteDescription(new RTCSessionDescription(s.data().answer));
                }
            });
            callDoc.collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                if (s.data()?.offer && !pc.currentRemoteDescription) {
                    callId = uid;
                    ringtone.play().catch(() => { console.log("সাউন্ড ইউজার টাচ ছাড়া বাজবে না"); });
                    document.getElementById('incoming-ui').classList.remove('hidden');
                }
            });
        }

        async function acceptCall() {
            ringtone.pause();
            document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('video-page').classList.remove('hidden');
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
            const callDoc = db.collection('calls').doc(callId);
            pc.onicecandidate = e => e.candidate && callDoc.collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await callDoc.update({ answer: { sdp: answer.sdp, type: answer.type } });
            callDoc.collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }
    </script>
</body>
</html>
