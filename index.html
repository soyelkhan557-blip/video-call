<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Messenger Pro</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; background-color: #000; color: white; height: 100vh; overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        /* স্ক্রিনশট অনুযায়ী ডার্ক মোড কালার */
        .messenger-bg { background-color: #000; }
        .search-bg { background-color: #1c1c1e; }
        .active-dot { width: 12px; height: 12px; background-color: #31a24c; border: 2px solid #000; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; }

        /* স্ক্রলিং এরিয়া */
        .scroll-area { overflow-y: auto; height: calc(100vh - 250px); }
        .horizontal-scroll { overflow-x: auto; white-space: nowrap; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        /* ইনপুট বক্স ডিজাইন */
        .id-input-box { width: 100%; background: #1c1c1e; border: 1px solid #333; border-radius: 12px; padding: 12px 15px; outline: none; color: white; font-size: 14px; }
        
        /* চ্যাট বাবল কালার (আপনার আগের bg.jpg থাকবে চ্যাট উইন্ডোতে) */
        #chat-window { position: fixed; inset: 0; z-index: 5000; display: none; flex-direction: column; background-image: url('bg.jpg'); background-size: cover; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.8); }
        .bubble-me { background: #0084ff; border-radius: 18px; padding: 10px 15px; align-self: flex-end; max-width: 80%; }
        .bubble-them { background: #333; border-radius: 18px; padding: 10px 15px; align-self: flex-start; max-width: 80%; }

        /* বটম বার */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #1c1c1e; display: flex; justify-content: space-around; padding: 10px 0 25px 0; }
    </style>
</head>
<body>

    <!-- ১. হোম স্ক্রিন (মেসেঞ্জার মেইন পেজ) -->
    <div id="home-screen" class="p-4 messenger-bg h-screen flex flex-col">
        
        <!-- আইডি বক্স (সবার উপরে) -->
        <div class="flex gap-2 mb-4">
            <input id="friend-id" type="text" placeholder="বন্ধুর আইডি দিন (সরাসরি চ্যাট করুন)" class="id-input-box">
            <button onclick="addAndChat()" class="bg-[#0084ff] px-6 rounded-xl font-bold text-sm">যোগ</button>
        </div>

        <!-- হেডার (মেনু ও এডিট) -->
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <span class="material-icons-round text-3xl">menu</span>
                <h1 class="text-2xl font-extrabold tracking-tight">messenger</h1>
            </div>
            <span class="material-icons-round bg-white/10 p-2 rounded-full">edit</span>
        </div>

        <!-- সার্চ বার -->
        <div class="search-bg flex items-center gap-3 p-3 rounded-full mb-6">
            <span class="material-icons-round text-gray-500">search</span>
            <input type="text" placeholder="Search" class="bg-transparent outline-none flex-1 text-sm">
        </div>

        <!-- অ্যাক্টিভ ফ্রেন্ডস (Stories) -->
        <div class="horizontal-scroll flex gap-5 mb-8" id="active-list">
            <!-- এখানে ডায়নামিক ভাবে অ্যাক্টিভ ফ্রেন্ডস আসবে -->
            <div class="flex flex-col items-center gap-1">
                <div class="relative">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-14 h-14 rounded-full p-[2px] border-2 border-indigo-500">
                    <div class="active-dot"></div>
                </div>
                <span class="text-[10px] text-gray-400">Your Story</span>
            </div>
        </div>

        <!-- চ্যাট লিস্ট এরিয়া -->
        <div class="scroll-area flex flex-col gap-5" id="chat-list">
            <p class="text-center text-gray-600 text-xs mt-10">ইউজার লোড হচ্ছে...</p>
        </div>

        <!-- বটম নেভিগেশন -->
        <div class="bottom-nav">
            <div class="flex flex-col items-center gap-1 text-[#0084ff]">
                <span class="material-icons-round text-3xl">chat</span>
                <span class="text-[10px] font-bold">Chats</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-500" onclick="showMyId()">
                <span class="material-icons-round text-3xl">perm_media</span>
                <span class="text-[10px]">Stories</span>
            </div>
        </div>
    </div>

    <!-- ২. চ্যাট উইন্ডো (মেসেঞ্জার লুক) -->
    <div id="chat-window">
        <div class="p-4 bg-black flex items-center gap-4 text-white border-b border-white/5 shadow-xl">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" src="" class="w-10 h-10 rounded-full object-cover border border-blue-500">
            <div class="flex-1">
                <h4 id="chat-user-name" class="font-bold text-sm">...</h4>
                <span class="text-[10px] text-green-500 font-bold uppercase">Online</span>
            </div>
            <div class="flex gap-4">
                <span class="material-icons-round text-blue-500 text-2xl">call</span>
                <button onclick="startCall()"><span class="material-icons-round text-blue-500 text-2xl">videocam</span></button>
            </div>
        </div>
        
        <div id="messages"></div>

        <div class="p-4 bg-black flex items-center gap-3 mb-4">
            <span class="material-icons-round text-blue-500">add_circle</span>
            <span class="material-icons-round text-blue-500" onclick="triggerGallery()">camera_alt</span>
            <div class="flex-1 bg-white/10 rounded-full flex items-center px-4">
                <input id="msg-input" type="text" placeholder="Aa" class="bg-transparent flex-1 py-2 outline-none text-white text-sm">
                <span class="material-icons-round text-blue-500">sentiment_satisfied</span>
            </div>
            <button id="send-btn" onclick="sendTextMsg()"><span class="material-icons-round text-blue-500 text-3xl">send</span></button>
        </div>
        <input type="file" id="gallery-input" class="hidden" accept="image/*,video/*" onchange="uploadMedia()">
    </div>

    <!-- ৩. কল স্ক্রিন (আপনার আগের ভিডিও কল সিস্টেম) -->
    <div id="call-ui" class="hidden fixed inset-0 z-[6000] bg-black flex flex-col items-center justify-center text-white">
        <img id="call-img" class="w-32 h-32 rounded-full border-4 border-blue-500 p-1 mb-6 animate-pulse">
        <h2 id="call-name" class="text-2xl font-bold">...</h2>
        <p class="text-blue-400 mt-4 animate-bounce">Calling...</p>
        <div class="mt-24 flex gap-12">
            <button onclick="hangup()" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center"><span class="material-icons-round text-4xl">call_end</span></button>
            <button id="answer-btn" onclick="answerCall()" class="hidden w-20 h-20 bg-green-500 rounded-full flex items-center justify-center"><span class="material-icons-round text-4xl">videocam</span></button>
        </div>
    </div>

    <!-- নোটিফিকেশন টোস্ট -->
    <div id="custom-toast" class="fixed top-10 left-0 right-0 flex justify-center hidden z-[7000]">
        <div class="bg-blue-600 px-6 py-3 rounded-full text-white font-bold text-sm shadow-2xl shadow-blue-500/50" id="toast-text"></div>
    </div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let currentChatId;
        const rt = document.getElementById('ringtone'), dt = document.getElementById('dialtone');

        function showToast(m) { 
            const t = document.getElementById('custom-toast'), tt = document.getElementById('toast-text');
            tt.innerText = m; t.classList.remove('hidden'); 
            setTimeout(() => t.classList.add('hidden'), 3000); 
        }

        // লগইন চেক
        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).set({ uid: user.uid, name: user.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png", lastSeen: Date.now() }, {merge: true});
                loadChatList();
                listenForCalls();
            } else {
                let p = prompt("মোবাইল নম্বর দিন (মেসেঞ্জারে স্বাগতম):");
                if(p) auth.signInWithEmailAndPassword(p+"@soyel.com", "123456").catch(()=>auth.createUserWithEmailAndPassword(p+"@soyel.com", "123456"));
            }
        });

        // বন্ধুর আইডি দিয়ে সরাসরি চ্যাট (আপনার স্পেশাল রিকুইয়েস্ট)
        async function addAndChat() {
            const id = document.getElementById('friend-id').value.trim();
            if(!id) return showToast("আইডি লিখুন!");
            if(id === auth.currentUser.uid) return showToast("নিজের সাথে চ্যাট করা যাবে না!");

            const doc = await db.collection('users').doc(id).get();
            if(!doc.exists) return showToast("ভুল আইডি!");

            const u = doc.data();
            await db.collection('users').doc(auth.currentUser.uid).collection('friends').doc(id).set({added: true});
            document.getElementById('friend-id').value = '';
            openChat(u.uid, u.name, u.photo);
        }

        // চ্যাট লিস্ট ও স্টোরি লোড
        function loadChatList() {
            db.collection('users').doc(auth.currentUser.uid).collection('friends').onSnapshot(snap => {
                const list = document.getElementById('chat-list'); 
                const active = document.getElementById('active-list');
                list.innerHTML = '';
                // active.innerHTML = ''; // আপনার নিজের স্টোরি চাইলে রাখতে পারেন

                snap.forEach(async d => {
                    const uDoc = await db.collection('users').doc(d.id).get();
                    const u = uDoc.data();
                    if(!u) return;

                    // চ্যাট লিস্ট আইটেম
                    const item = document.createElement('div');
                    item.className = "flex items-center gap-4 active:bg-white/5 p-2 rounded-xl transition-all";
                    item.innerHTML = `
                        <div class="relative">
                            <img src="${u.photo}" class="w-16 h-16 rounded-full object-cover">
                            <div class="active-dot"></div>
                        </div>
                        <div class="flex-1 border-b border-white/5 pb-3">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold text-white">${u.name}</h3>
                                <span class="text-[10px] text-gray-500">7:14 am</span>
                            </div>
                            <p class="text-xs text-gray-500 truncate w-40">Say hi to your friend...</p>
                        </div>
                    `;
                    item.onclick = () => openChat(u.uid, u.name, u.photo);
                    list.appendChild(item);

                    // স্টোরি লিস্ট আইটেম
                    const story = document.createElement('div');
                    story.className = "flex flex-col items-center gap-1 flex-shrink-0";
                    story.innerHTML = `
                        <div class="relative" onclick="openChat('${u.uid}', '${u.name}', '${u.photo}')">
                            <img src="${u.photo}" class="w-14 h-14 rounded-full p-[2px] border-2 border-blue-500">
                            <div class="active-dot"></div>
                        </div>
                        <span class="text-[10px] text-gray-400 w-14 truncate text-center">${u.name}</span>
                    `;
                    active.appendChild(story);
                });
            });
        }

        function openChat(id, name, img) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-img').src = img;
            document.getElementById('chat-window').style.display = 'flex';
            listenMessages();
        }

        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function listenMessages() {
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            db.collection('chats').doc(cid).collection('messages').orderBy('ts').onSnapshot(snap => {
                const mDiv = document.getElementById('messages'); mDiv.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data(), isMe = data.sender === auth.currentUser.uid;
                    const b = document.createElement('div');
                    b.className = isMe ? 'bubble-me' : 'bubble-them';
                    
                    if(data.type === 'text') b.innerText = data.content;
                    else if(data.type === 'image') b.innerHTML = `<img src="${data.content}" class="w-full rounded-lg">`;
                    else if(data.type === 'video') b.innerHTML = `<video src="${data.content}" controls class="w-full rounded-lg"></video>`;
                    
                    b.oncontextmenu = (e) => { e.preventDefault(); if(confirm("ডিলিট করবেন?")) doc.ref.delete(); };
                    mDiv.appendChild(b);
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
        }

        async function sendTextMsg() {
            const val = document.getElementById('msg-input').value;
            if(!val) return;
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            await db.collection('chats').doc(cid).collection('messages').add({
                sender: auth.currentUser.uid, type: 'text', content: val, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msg-input').value = '';
        }

        function triggerGallery() { document.getElementById('gallery-input').click(); }
        function uploadMedia() {
            const file = document.getElementById('gallery-input').files[0];
            const r = new FileReader();
            r.onload = async (e) => {
                const type = file.type.startsWith('image/') ? 'image' : 'video';
                if(e.target.result.length > 1000000) return showToast("ফাইল অনেক বড়!");
                const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
                await db.collection('chats').doc(cid).collection('messages').add({
                    sender: auth.currentUser.uid, type, content: e.target.result, ts: firebase.firestore.FieldValue.serverTimestamp()
                });
            };
            r.readAsDataURL(file);
        }

        // ভিডিও কল সিস্টেম (আগের লজিক)
        async function startCall() {
            dt.play();
            document.getElementById('call-name').innerText = document.getElementById('chat-user-name').innerText;
            document.getElementById('call-img').src = document.getElementById('chat-user-img').src;
            document.getElementById('call-ui').classList.remove('hidden');
            await db.collection('calls').doc(currentChatId).set({ status: 'ringing', from: auth.currentUser.uid, name: auth.currentUser.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });
        }

        function listenForCalls() {
            db.collection('calls').doc(auth.currentUser.uid).onSnapshot(s => {
                const d = s.data();
                if(d?.status === 'ringing') {
                    rt.play();
                    document.getElementById('call-name').innerText = d.name;
                    document.getElementById('call-img').src = d.photo;
                    document.getElementById('call-ui').classList.remove('hidden');
                    document.getElementById('answer-btn').classList.remove('hidden');
                }
                if(!s.exists) hangup();
            });
        }

        function hangup() {
            rt.pause(); dt.pause();
            db.collection('calls').doc(auth.currentUser.uid).delete();
            if(currentChatId) db.collection('calls').doc(currentChatId).delete();
            document.getElementById('call-ui').classList.add('hidden');
        }

        function showMyId() { 
            const id = auth.currentUser.uid;
            prompt("আপনার আইডি কপি করুন:", id);
        }
    </script>
</body>
</html>
