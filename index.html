<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Pro Messenger</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-color: #0b141a; height: 100vh; -webkit-tap-highlight-color: transparent; }
        .bg-app { background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        .dark-overlay { background: rgba(0, 0, 0, 0.7); height: 100%; width: 100%; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 25px; }
        
        #chat-window { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; background: #0b141a; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.4); }
        
        /* বাবল ও মিডিয়া ডিজাইন */
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 85%; font-size: 15px; color: white; position: relative; cursor: pointer; transition: 0.2s; }
        .bubble:active { background: rgba(255,255,255,0.1); }
        .bubble-me { background: #075e54; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #1f2c33; align-self: flex-start; border-bottom-left-radius: 4px; }
        .media-msg { max-width: 250px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* ভয়েস বার */
        .voice-container { display: flex; align-items: center; gap: 10px; min-width: 180px; }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #34d399; width: 0%; transition: width 0.1s linear; }
        
        /* ইনপুট বার */
        .input-bar { padding: 10px 10px 30px 10px; background: #0b141a; border-top: 1px solid rgba(255,255,255,0.05); }
        .input-container { display: flex; align-items: center; gap: 8px; position: relative; }
        .text-input-field { flex: 1; background: #1f2c33; border-radius: 30px; display: flex; align-items: center; padding: 0 10px; }
        input#msg-input { background: transparent; border: none; outline: none; color: white; flex: 1; padding: 12px 0; font-size: 15px; }

        .recording-ui { position: absolute; inset: 0; background: #0b141a; display: none; align-items: center; border-radius: 30px; z-index: 10; padding: 0 15px; }

        /* কল স্ক্রিন UI (স্ক্রিনশট অনুযায়ী) */
        .call-screen { position: fixed; inset: 0; z-index: 5000; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .call-profile-circle { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #4f46e5; padding: 5px; animation: pulse 2s infinite; }
        .call-profile-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .hangup-btn { width: 75px; height: 75px; background: #ff3b30; border-radius: 50%; display: flex; items: center; justify-content: center; box-shadow: 0 10px 30px rgba(255, 59, 48, 0.4); }
        .accept-btn { width: 75px; height: 75px; background: #4cd964; border-radius: 50%; display: flex; items: center; justify-content: center; box-shadow: 0 10px 30px rgba(76, 217, 100, 0.4); }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(79, 70, 229, 0); } 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); } }

        /* ভিডিও এরিয়া */
        #remoteVideo { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 30px; right: 20px; width: 100px; height: 150px; border-radius: 15px; border: 2px solid white; z-index: 10; }

        /* ডিলিট মেনু */
        #delete-menu { position: fixed; bottom: 0; left: 0; right: 0; background: #1f2c33; border-radius: 30px 30px 0 0; padding: 25px 20px; z-index: 6000; display: none; transition: 0.3s; transform: translateY(100%); }
        #delete-menu.show { display: block; transform: translateY(0); }

        #custom-toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 9999; transition: 0.4s; opacity: 0; }
        #custom-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body onclick="setupAudio()" class="bg-app">

    <div id="custom-toast"><div class="bg-white/10 backdrop-blur-md border border-white/20 p-4 rounded-full flex items-center gap-3 shadow-2xl text-white"><span id="toast-text"></span></div></div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <div class="dark-overlay">
        <!-- লগইন -->
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-8 w-full max-w-sm">
                <h1 class="text-3xl font-bold text-white mb-6 italic">Soyel Pro</h1>
                <input id="login-email" type="text" placeholder="মোবাইল নম্বর" class="w-full p-4 bg-white/10 rounded-xl text-white mb-3">
                <input id="login-pass" type="password" placeholder="পাসওয়ার্ড" class="w-full p-4 bg-white/10 rounded-xl text-white mb-4">
                <button onclick="loginEmail()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">প্রবেশ করুন</button>
            </div>
        </div>

        <!-- ড্যাশবোর্ড -->
        <div id="dashboard" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
            <header class="flex justify-between items-center mb-10"><img id="my-photo" class="w-12 h-12 rounded-full border-2 border-indigo-400"><button onclick="showIdModal()" class="bg-indigo-600 px-5 py-2 rounded-xl text-white text-xs font-bold">MY ID</button></header>
            <div class="flex gap-2 mb-6"><input id="target-id" placeholder="বন্ধুর আইডি দিন" class="flex-1 p-4 glass text-white text-xs outline-none"><button onclick="addNewContact()" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold">যোগ</button></div>
            <div id="contact-list" class="flex-1 overflow-y-auto"></div>
        </div>
    </div>

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-4 flex items-center gap-3 text-white border-b border-white/5">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" class="w-10 h-10 rounded-full">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4><span class="text-green-500 text-[10px]">অনলাইন</span></div>
            <button onclick="initCallFlow()"><span class="material-icons-round text-3xl text-indigo-400">videocam</span></button>
        </div>
        <div id="messages"></div>
        <div class="input-bar">
            <div class="input-container">
                <div id="normal-input" class="text-input-field">
                    <button onclick="document.getElementById('file-input').click()" class="text-[#8696a0] pr-2"><span class="material-icons-round">add_circle</span></button>
                    <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." autocomplete="off">
                </div>
                <div id="recording-overlay" class="recording-ui">
                    <span class="material-icons-round text-red-500 animate-pulse">mic</span>
                    <span id="rec-timer" class="text-white font-bold ml-4">0:00</span>
                    <button id="v-send-btn" onclick="stopVoiceRecord(true)" class="bg-[#00a884] text-white w-10 h-10 rounded-full flex items-center justify-center ml-auto"><span class="material-icons-round text-sm">send</span></button>
                </div>
                <button id="record-btn" onclick="startVoiceRecord()" class="bg-[#00a884] text-white w-12 h-12 rounded-full flex items-center justify-center ml-2"><span class="material-icons-round">mic</span></button>
                <button id="send-btn" onclick="sendMsg()" class="hidden bg-[#00a884] text-white w-12 h-12 rounded-full flex items-center justify-center ml-2"><span class="material-icons-round">send</span></button>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*,video/*" onchange="handleFile()">
        </div>
    </div>

    <!-- ইনকামিং কল -->
    <div id="incoming-ui" class="hidden call-screen">
        <div class="call-profile-circle mb-8"><img id="caller-img"></div>
        <h2 id="caller-name" class="text-2xl font-bold mb-2">...</h2>
        <p class="text-green-400 mb-20 uppercase tracking-widest text-xs">ভিডিও কল আসছে...</p>
        <div class="flex gap-16">
            <button onclick="hangup()" class="hangup-btn"><span class="material-icons-round text-4xl text-white">close</span></button>
            <button onclick="acceptCall()" class="accept-btn"><span class="material-icons-round text-4xl text-white">videocam</span></button>
        </div>
    </div>

    <!-- আউটগোয়িং কল -->
    <div id="calling-ui" class="hidden call-screen">
        <div class="call-profile-circle mb-8"><img id="target-img-call"></div>
        <h2 id="target-name-call" class="text-2xl font-bold mb-2">...</h2>
        <p id="call-status" class="text-indigo-400 mb-20 uppercase tracking-widest text-xs">Calling...</p>
        <button onclick="hangup()" class="hangup-btn"><span class="material-icons-round text-4xl text-white">call_end</span></button>
    </div>

    <!-- ভিডিও কল পেজ -->
    <div id="video-page" class="hidden fixed inset-0 z-[6000] bg-black">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center">
            <button onclick="hangup()" class="hangup-btn"><span class="material-icons-round text-4xl text-white">call_end</span></button>
        </div>
    </div>

    <!-- ডিলিট মেনু -->
    <div id="delete-menu">
        <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
        <button onclick="deleteNow()" class="w-full p-4 bg-red-500/20 text-red-500 rounded-xl font-bold mb-3">সবার জন্য ডিলিট</button>
        <button onclick="closeDeleteMenu()" class="w-full p-4 bg-white/5 text-white rounded-xl font-bold">বাতিল</button>
    </div>

    <div id="id-modal" class="hidden fixed inset-0 z-[9000] bg-black/90 flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="glass p-8 w-full max-w-sm text-center text-white" onclick="event.stopPropagation()">
            <p id="my-id-display" class="font-mono text-xs break-all bg-black/50 p-4 rounded-xl mb-4"></p>
            <button onclick="copyId()" class="w-full bg-white text-indigo-900 py-3 rounded-xl font-bold">ID কপি করুন</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc, localStream, currentChatId, fileData, mediaRecorder, audioChunks = [], timerInterval, selectedMsgId, audioInstances = {};
        const rt = document.getElementById('ringtone'), dt = document.getElementById('dialtone');

        function setupAudio() { rt.play().then(()=>rt.pause()); dt.play().then(()=>dt.pause()); }
        function showToast(m) { const t = document.getElementById('custom-toast'); document.getElementById('toast-text').innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

        async function loginEmail() {
            const e = document.getElementById('login-email').value.trim() + "@soyel.com", p = document.getElementById('login-pass').value;
            if(!p) return showToast("পাসওয়ার্ড দিন");
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { showToast(err.message); } }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display').innerText = user.uid;
                document.getElementById('my-photo').src = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                db.collection('users').doc(user.uid).set({ name: user.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png", uid: user.uid });
                listenForCalls(user.uid); loadContacts(user.uid);
            }
        });

        function loadContacts(uid) {
            db.collection('users').doc(uid).collection('contacts').onSnapshot(snap => {
                const list = document.getElementById('contact-list'); list.innerHTML = '';
                snap.forEach(async d => {
                    const ud = (await db.collection('users').doc(d.id).get()).data();
                    if(ud) {
                        const div = document.createElement('div');
                        div.className = "flex items-center gap-4 bg-white/5 p-4 rounded-2xl mb-3";
                        div.innerHTML = `<img src="${ud.photo}" class="w-12 h-12 rounded-full border border-indigo-500"><div class="flex-1 text-white font-bold">${ud.name}</div>`;
                        div.onclick = () => openChat(ud.uid, ud.name, ud.photo);
                        list.appendChild(div);
                    }
                });
            });
        }

        async function addNewContact() {
            const id = document.getElementById('target-id').value.trim();
            if(!id || id === auth.currentUser.uid) return showToast("সঠিক আইডি দিন");
            await db.collection('users').doc(auth.currentUser.uid).collection('contacts').doc(id).set({added: true});
            showToast("যুক্ত হয়েছে");
        }

        // চ্যাট ফাংশনালিটি
        function getChatId(fId) { return auth.currentUser.uid < fId ? auth.currentUser.uid + "_" + fId : fId + "_" + auth.currentUser.uid; }
        function openChat(id, n, p) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = n;
            document.getElementById('chat-user-img').src = p;
            document.getElementById('chat-window').style.display = 'flex';
            listenForMsg(id);
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function listenForMsg(friendId) {
            db.collection('chats').doc(getChatId(friendId)).collection('messages').orderBy('ts').onSnapshot(s => {
                const div = document.getElementById('messages'); div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data(), isMe = data.sender === auth.currentUser.uid;
                    const b = document.createElement('div');
                    b.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                    
                    let html = data.media ? `<img src="${data.media}" class="media-msg">` : '';
                    if(data.voice) {
                        html += `<div class="voice-container" onclick="toggleAudio('${d.id}', '${data.voice}')"><span id="icon-${d.id}" class="material-icons-round">play_arrow</span><div class="progress-bar"><div id="fill-${d.id}" class="progress-fill"></div></div></div>`;
                    } else { html += `<div>${data.text || ""}</div>`; }
                    
                    b.innerHTML = html;
                    // হোল্ড করে ডিলিট
                    let pressTimer;
                    b.onmousedown = b.ontouchstart = () => { pressTimer = setTimeout(() => { selectedMsgId = d.id; document.getElementById('delete-menu').classList.add('show'); }, 600); };
                    b.onmouseup = b.ontouchend = () => clearTimeout(pressTimer);
                    
                    div.appendChild(b);
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function sendMsg() {
            const t = document.getElementById('msg-input').value; if(!t && !fileData) return;
            await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').add({ text: t || "", media: fileData || null, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('msg-input').value = ''; fileData = null;
        }

        function handleFile() {
            const f = document.getElementById('file-input').files[0];
            const r = new FileReader(); r.onload = e => { fileData = e.target.result; sendMsg(); };
            r.readAsDataURL(f);
        }

        // ভয়েস রেকর্ড লজিক
        async function startVoiceRecord() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s); audioChunks = [];
                document.getElementById('recording-overlay').style.display = 'flex';
                let sec = 0; timerInterval = setInterval(() => { sec++; document.getElementById('rec-timer').innerText = `0:${sec < 10 ? '0' : ''}${sec}`; }, 1000);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.start();
            } catch(e) { showToast("মাইক্রোফোন এক্সেস দিন"); }
        }

        function stopVoiceRecord(send) {
            if(!mediaRecorder) return;
            mediaRecorder.onstop = async () => {
                if(send) {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = new FileReader(); r.readAsDataURL(blob);
                    r.onload = async () => { await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').add({ voice: r.result, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp() }); };
                }
                document.getElementById('recording-overlay').style.display = 'none';
                clearInterval(timerInterval);
            };
            mediaRecorder.stop();
        }

        function toggleAudio(id, url) {
            if(!audioInstances[id]) {
                audioInstances[id] = new Audio(url);
                audioInstances[id].ontimeupdate = () => document.getElementById('fill-'+id).style.width = (audioInstances[id].currentTime / audioInstances[id].duration) * 100 + "%";
                audioInstances[id].onended = () => document.getElementById('icon-'+id).innerText = "play_arrow";
            }
            const a = audioInstances[id];
            if(a.paused) { a.play(); document.getElementById('icon-'+id).innerText = "pause"; } else { a.pause(); document.getElementById('icon-'+id).innerText = "play_arrow"; }
        }

        async function deleteNow() { await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').doc(selectedMsgId).delete(); closeDeleteMenu(); }
        function closeDeleteMenu() { document.getElementById('delete-menu').classList.remove('show'); }

        // কলিং লজিক
        async function initCallFlow() {
            dt.play();
            document.getElementById('target-name-call').innerText = document.getElementById('chat-user-name').innerText;
            document.getElementById('target-img-call').src = document.getElementById('chat-user-img').src;
            document.getElementById('calling-ui').classList.remove('hidden');

            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && callDoc.collection('offerCandidates').add(e.candidate.toJSON());
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await callDoc.set({ offer, status: 'ringing', callerName: auth.currentUser.email.split('@')[0], callerPhoto: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });

            callDoc.onSnapshot(s => {
                const data = s.data();
                if(data?.status === 'ringing') document.getElementById('call-status').innerText = "Ringing...";
                if(data?.answer && !pc.currentRemoteDescription) {
                    dt.pause(); document.getElementById('calling-ui').classList.add('hidden');
                    document.getElementById('video-page').classList.remove('hidden');
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });
            callDoc.collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                const data = s.data();
                if(data?.offer && data?.status === 'ringing') {
                    currentChatId = uid;
                    document.getElementById('caller-name').innerText = data.callerName;
                    document.getElementById('caller-img').src = data.callerPhoto;
                    rt.play();
                    document.getElementById('incoming-ui').classList.remove('hidden');
                }
                if(!s.exists || data?.status === 'ended') hangup();
            });
        }

        async function acceptCall() {
            rt.pause(); document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('video-page').classList.remove('hidden');
            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            const callDoc = db.collection('calls').doc(auth.currentUser.uid);
            pc.onicecandidate = e => e.candidate && callDoc.collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await callDoc.update({ answer, status: 'connected' });
            callDoc.collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        async function hangup() {
            rt.pause(); dt.pause();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close(); pc = null;
            await db.collection('calls').doc(auth.currentUser.uid).delete();
            if(currentChatId) await db.collection('calls').doc(currentChatId).delete();
            document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('calling-ui').classList.add('hidden');
            document.getElementById('video-page').classList.add('hidden');
        }

        function showIdModal() { document.getElementById('id-modal').classList.remove('hidden'); }
        function copyId() { navigator.clipboard.writeText(document.getElementById('my-id-display').innerText); showToast("ID কপি হয়েছে"); }
        document.getElementById('msg-input').oninput = (e) => {
            const s = document.getElementById('send-btn'), r = document.getElementById('record-btn');
            if(e.target.value.trim().length > 0) { s.classList.remove('hidden'); r.classList.add('hidden'); }
            else { s.classList.add('hidden'); r.classList.remove('hidden'); }
        };
    </script>
</body>
</html>
