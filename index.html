<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Pro Messenger</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-color: #0b141a; height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        /* চ্যাট স্ক্রিন ডিজাইন (স্ক্রিনশট অনুযায়ী) */
        #chat-window { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; background-color: #0b141a; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0b141a; }
        
        /* বাবল ডিজাইন */
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; color: white; position: relative; line-height: 1.4; }
        .bubble-me { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #202c33; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* মিডিয়া মেসেজ */
        .media-msg { max-width: 100%; border-radius: 12px; margin-top: 4px; display: block; background: #000; }
        
        /* ভয়েস নোট ডিজাইন */
        .voice-note { display: flex; align-items: center; gap: 8px; min-width: 200px; padding: 5px 0; }
        .play-btn { color: white; cursor: pointer; }
        .waveform { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; position: relative; }
        .progress { position: absolute; left: 0; top: 0; height: 100%; background: #34d399; width: 0%; }

        /* ইনপুট এরিয়া */
        .bottom-bar { padding: 10px; background: #0b141a; display: flex; align-items: center; gap: 8px; }
        .input-box { flex: 1; background: #2a3942; border-radius: 25px; display: flex; align-items: center; padding: 5px 12px; }
        #msg-input { background: transparent; border: none; outline: none; color: white; flex: 1; padding: 8px 5px; font-size: 15px; }
        
        .mic-btn, .send-btn { background: #00a884; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* ভয়েস রেকর্ডিং অ্যানিমেশন */
        #rec-overlay { display: none; flex: 1; align-items: center; gap: 15px; color: white; padding-left: 10px; }
        .dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* কল স্ক্রিন */
        .call-ui { position: fixed; inset: 0; z-index: 5000; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .avatar { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #00a884; object-fit: cover; margin-bottom: 20px; }
        .hangup { background: #ff3b30; width: 70px; height: 70px; border-radius: 50%; display: flex; items: center; justify-content: center; }

        #delete-menu { position: fixed; bottom: 0; left: 0; right: 0; background: #233138; padding: 20px; border-radius: 20px 20px 0 0; display: none; z-index: 6000; }
    </style>
</head>
<body onclick="initAudio()">

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-3 bg-[#202c33] flex items-center gap-3 text-white shadow-md">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" class="w-10 h-10 rounded-full object-cover">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4><span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">অনলাইন</span></div>
            <button onclick="startVideoCall()"><span class="material-icons-round text-indigo-400 text-2xl">videocam</span></button>
        </div>
        
        <div id="messages"></div>

        <div class="bottom-bar">
            <div class="input-box">
                <button onclick="openGallery()"><span class="material-icons-round text-[#8696a0]">add</span></button>
                <div id="rec-overlay"><div class="dot"></div><span id="rec-time">0:00</span></div>
                <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." autocomplete="off">
            </div>
            <button id="mic-btn" class="mic-btn" onclick="toggleRecord()"><span class="material-icons-round">mic</span></button>
            <button id="send-btn" class="send-btn hidden" onclick="sendMsg()"><span class="material-icons-round">send</span></button>
        </div>
        <input type="file" id="gallery-input" class="hidden" accept="image/*,video/*" onchange="handleGalleryUpload()">
    </div>

    <!-- ডিলিট মেনু -->
    <div id="delete-menu">
        <button onclick="deleteMsg()" class="w-full p-4 bg-red-500/20 text-red-500 rounded-xl font-bold mb-3">সবার জন্য ডিলিট</button>
        <button onclick="hideDeleteMenu()" class="w-full p-4 bg-white/5 text-white rounded-xl font-bold">বাতিল</button>
    </div>

    <!-- কল স্ক্রিন -->
    <div id="call-ui" class="hidden">
        <img id="call-img" class="avatar">
        <h2 id="call-name" class="text-2xl font-bold">...</h2>
        <p id="call-status" class="mt-4 text-indigo-400 font-bold uppercase tracking-widest text-xs">Calling...</p>
        <div class="mt-24 flex gap-10">
            <button onclick="endCall()" class="hangup"><span class="material-icons-round text-3xl">call_end</span></button>
            <button id="accept-btn" onclick="answerCall()" class="hidden bg-green-500 w-[70px] h-[70px] rounded-full flex items-center justify-center"><span class="material-icons-round text-3xl">videocam</span></button>
        </div>
    </div>

    <!-- ভিডিও এরিয়া -->
    <div id="video-area" class="hidden fixed inset-0 bg-black z-[5500]">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 w-full flex justify-center">
            <button onclick="endCall()" class="hangup"><span class="material-icons-round text-3xl text-white">call_end</span></button>
        </div>
    </div>

    <!-- ড্যাশবোর্ড (লগইন করা থাকলে) -->
    <div id="dashboard" class="p-5 text-white">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold italic">Soyel Pro</h2>
            <button onclick="showMyId()" class="bg-indigo-600 px-4 py-2 rounded-lg text-xs font-bold">MY ID</button>
        </div>
        <div class="flex gap-2 mb-6">
            <input id="friend-id" placeholder="বন্ধুর আইডি দিন" class="flex-1 bg-[#2a3942] p-4 rounded-xl outline-none">
            <button onclick="addFriend()" class="bg-indigo-600 px-6 rounded-xl font-bold">যোগ</button>
        </div>
        <div id="contacts"></div>
    </div>

    <!-- অডিও ফাইলস -->
    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script>
        // ফায়ারবেস কনফিগ
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let currentChatId, pc, localStream, mediaRecorder, chunks = [], recInterval, isRecording = false, selectedMsgId;
        const rt = document.getElementById('ringtone'), dt = document.getElementById('dialtone');

        function initAudio() { rt.play().then(()=>rt.pause()); dt.play().then(()=>dt.pause()); }

        // ১. অটো লগইন (সহজ পদ্ধতি)
        auth.onAuthStateChanged(user => {
            if(!user) {
                let phone = prompt("আপনার মোবাইল নম্বর দিন:");
                if(phone) auth.signInWithEmailAndPassword(phone + "@soyel.com", "123456").catch(() => auth.createUserWithEmailAndPassword(phone + "@soyel.com", "123456"));
            } else {
                db.collection('users').doc(user.uid).set({ uid: user.uid, name: user.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });
                loadContacts();
                listenForIncomingCalls();
            }
        });

        // ২. কন্টাক্ট লিস্ট
        function loadContacts() {
            db.collection('users').doc(auth.currentUser.uid).collection('friends').onSnapshot(snap => {
                const cont = document.getElementById('contacts'); cont.innerHTML = '';
                snap.forEach(async doc => {
                    const u = (await db.collection('users').doc(doc.id).get()).data();
                    if(u) {
                        const d = document.createElement('div');
                        d.className = "flex items-center gap-4 bg-[#202c33] p-4 rounded-2xl mb-3";
                        d.innerHTML = `<img src="${u.photo}" class="w-12 h-12 rounded-full border border-indigo-500"><div class="font-bold">${u.name}</div>`;
                        d.onclick = () => openChat(u.uid, u.name, u.photo);
                        cont.appendChild(d);
                    }
                });
            });
        }

        async function addFriend() {
            const id = document.getElementById('friend-id').value.trim();
            if(id && id !== auth.currentUser.uid) {
                await db.collection('users').doc(auth.currentUser.uid).collection('friends').doc(id).set({added: true});
                document.getElementById('friend-id').value = '';
            }
        }

        // ৩. চ্যাট সিস্টেম
        function openChat(id, name, img) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-img').src = img;
            document.getElementById('chat-window').style.display = 'flex';
            listenForMessages();
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function listenForMessages() {
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            db.collection('chats').doc(cid).collection('messages').orderBy('ts').onSnapshot(snap => {
                const msgDiv = document.getElementById('messages'); msgDiv.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data(), isMe = data.sender === auth.currentUser.uid;
                    const b = document.createElement('div');
                    b.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                    
                    if(data.type === 'text') b.innerText = data.content;
                    else if(data.type === 'image') b.innerHTML = `<img src="${data.content}" class="media-msg">`;
                    else if(data.type === 'video') b.innerHTML = `<video src="${data.content}" controls class="media-msg"></video>`;
                    else if(data.type === 'voice') {
                        b.innerHTML = `<div class="voice-note" onclick="playVoice('${doc.id}', '${data.content}')">
                            <span id="ico-${doc.id}" class="material-icons-round">play_arrow</span>
                            <div class="waveform"><div id="prog-${doc.id}" class="progress"></div></div>
                        </div>`;
                    }

                    b.oncontextmenu = (e) => { e.preventDefault(); selectedMsgId = {cid, mid: doc.id}; document.getElementById('delete-menu').style.display = 'block'; };
                    msgDiv.appendChild(b);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }

        async function sendMsg(type, content) {
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            await db.collection('chats').doc(cid).collection('messages').add({
                sender: auth.currentUser.uid,
                type: type,
                content: content,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function sendText() {
            const val = document.getElementById('msg-input').value;
            if(val) { sendMsg('text', val); document.getElementById('msg-input').value = ''; updateInputIcons(); }
        }
        window.sendMsg = sendText; // ওভাররাইড

        // ৪. গ্যালারি ও মিডিয়া (ফিক্সড)
        function openGallery() { document.getElementById('gallery-input').click(); }
        function handleGalleryUpload() {
            const file = document.getElementById('gallery-input').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const type = file.type.startsWith('image/') ? 'image' : 'video';
                sendMsg(type, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // ৫. ভয়েস রেকর্ডার (ফিক্সড)
        async function toggleRecord() {
            if(!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (e) => sendMsg('voice', e.target.result);
                    reader.readAsDataURL(blob);
                };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('rec-overlay').style.display = 'flex';
                document.getElementById('msg-input').style.display = 'none';
                let s = 0; recInterval = setInterval(() => { s++; document.getElementById('rec-time').innerText = `0:${s<10?'0':''}${s}`; }, 1000);
            } else {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('rec-overlay').style.display = 'none';
                document.getElementById('msg-input').style.display = 'block';
                clearInterval(recInterval);
            }
        }

        function playVoice(id, url) {
            const a = new Audio(url);
            a.play();
            document.getElementById('ico-'+id).innerText = 'pause';
            a.ontimeupdate = () => { document.getElementById('prog-'+id).style.width = (a.currentTime/a.duration)*100 + "%"; };
            a.onended = () => { document.getElementById('ico-'+id).innerText = 'play_arrow'; };
        }

        // ৬. কলিং সিস্টেম
        async function startVideoCall() {
            dt.play();
            document.getElementById('call-name').innerText = document.getElementById('chat-user-name').innerText;
            document.getElementById('call-img').src = document.getElementById('chat-user-img').src;
            document.getElementById('call-ui').classList.remove('hidden');
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && callDoc.collection('offerCandidates').add(e.candidate.toJSON());
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await callDoc.set({ offer, status: 'ringing', name: auth.currentUser.email.split('@')[0] });

            callDoc.onSnapshot(s => {
                const d = s.data();
                if(d?.answer && !pc.currentRemoteDescription) pc.setRemoteDescription(new RTCSessionDescription(d.answer)).then(() => {
                    dt.pause(); document.getElementById('call-ui').classList.add('hidden'); document.getElementById('video-area').classList.remove('hidden');
                });
            });
        }

        function listenForIncomingCalls() {
            db.collection('calls').doc(auth.currentUser.uid).onSnapshot(async s => {
                const d = s.data();
                if(d?.status === 'ringing') {
                    rt.play();
                    document.getElementById('call-name').innerText = d.name;
                    document.getElementById('call-ui').classList.remove('hidden');
                    document.getElementById('accept-btn').classList.remove('hidden');
                    document.getElementById('call-status').innerText = "ইনকামিং ভিডিও কল...";
                }
                if(!s.exists) endCall();
            });
        }

        async function answerCall() {
            rt.pause();
            document.getElementById('call-ui').classList.add('hidden');
            document.getElementById('video-area').classList.remove('hidden');
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];

            const callDoc = db.collection('calls').doc(auth.currentUser.uid);
            pc.onicecandidate = e => e.candidate && callDoc.collection('answerCandidates').add(e.candidate.toJSON());
            
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await callDoc.update({ answer, status: 'connected' });
        }

        function endCall() {
            rt.pause(); dt.pause();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            db.collection('calls').doc(auth.currentUser.uid).delete();
            document.getElementById('call-ui').classList.add('hidden');
            document.getElementById('video-area').classList.add('hidden');
        }

        // ডিলিট মেসেজ
        async function deleteMsg() {
            await db.collection('chats').doc(selectedMsgId.cid).collection('messages').doc(selectedMsgId.mid).delete();
            hideDeleteMenu();
        }
        function hideDeleteMenu() { document.getElementById('delete-menu').style.display = 'none'; }

        // ইনপুট আইকন আপডেট
        document.getElementById('msg-input').oninput = updateInputIcons;
        function updateInputIcons() {
            const v = document.getElementById('msg-input').value;
            if(v.trim()) { document.getElementById('mic-btn').classList.add('hidden'); document.getElementById('send-btn').classList.remove('hidden'); }
            else { document.getElementById('mic-btn').classList.remove('hidden'); document.getElementById('send-btn').classList.add('hidden'); }
        }

        function showMyId() { alert("আপনার আইডি: " + auth.currentUser.uid); }
    </script>
</body>
</html>
