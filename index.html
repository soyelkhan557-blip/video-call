<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Pro Messenger - Master Edition</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-color: #0f172a; height: 100vh; -webkit-tap-highlight-color: transparent; }
        .bg-app { background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        .dark-overlay { background: rgba(0, 0, 0, 0.6); height: 100%; width: 100%; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 25px; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 20px; border: 2px solid #fff; z-index: 10; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* চ্যাট স্ক্রিন */
        #chat-window { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.75); }
        
        /* বাবল ও চেপে ধরার ইফেক্ট */
        .bubble { padding: 12px; border-radius: 20px; min-width: 140px; max-width: 85%; position: relative; transition: transform 0.1s; user-select: none; -webkit-user-select: none; }
        .bubble:active { transform: scale(0.97); }
        .bubble-me { background: #075e54; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #1f2c33; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* ভয়েস প্লেয়ার */
        .voice-container { display: flex; align-items: center; gap: 10px; width: 100%; }
        .play-btn { width: 35px; height: 35px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: #34d399; width: 0%; }
        
        /* ডিলিট মেনু (Bottom Sheet) */
        #delete-menu { position: fixed; bottom: 0; left: 0; right: 0; background: #1f2c33; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 20px; z-index: 5000; display: none; transform: translateY(100%); transition: transform 0.3s ease; }
        #delete-menu.show { display: block; transform: translateY(0); }

        .input-area { padding: 10px 10px 35px 10px; background: #0b141a; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body onclick="startAudio()" class="bg-app">

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <div class="dark-overlay">
        <!-- লগইন -->
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-12">
                <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" class="w-24 h-24 mb-6 mx-auto">
                <h1 class="text-3xl font-bold text-white mb-2 italic">SOYEL PRO</h1>
                <button onclick="login()" class="bg-white text-indigo-600 px-12 py-4 rounded-full font-bold shadow-xl mt-6">গুগল দিয়ে প্রবেশ</button>
            </div>
        </div>

        <!-- ড্যাশবোর্ড -->
        <div id="dashboard" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
            <header class="flex justify-between items-center text-white mb-10">
                <img id="my-photo" src="" class="w-11 h-11 rounded-full border-2 border-indigo-400">
                <button onclick="showIdModal()" class="bg-indigo-600 px-5 py-2 rounded-xl text-xs font-bold shadow-lg">MY ID</button>
            </header>
            <div class="space-y-6 overflow-y-auto flex-1">
                <div class="flex gap-2">
                    <input id="target-id" type="text" placeholder="বন্ধুর আইডি দিন" class="flex-1 p-4 glass text-white text-xs outline-none border-none">
                    <button onclick="addNewContact()" class="bg-indigo-600 text-white px-5 rounded-2xl font-bold text-xs">যোগ</button>
                </div>
                <div id="contact-list"></div>
            </div>
        </div>
    </div>

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-4 bg-[#0b141a] flex items-center gap-3 text-white border-b border-white/5">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" src="" class="w-10 h-10 rounded-full">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4></div>
            <button onclick="startCall()" class="p-2 text-green-500"><span class="material-icons-round text-2xl">videocam</span></button>
        </div>
        
        <div id="messages"></div>

        <div class="input-area">
            <div id="normal-input" class="flex items-center gap-2">
                <div class="flex-1 flex items-center bg-[#1f2c33] rounded-full px-3 py-1">
                    <button onclick="document.getElementById('file-input').click()" class="text-[#8696a0] p-2"><span class="material-icons-round">add_circle</span></button>
                    <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." class="flex-1 bg-transparent border-none outline-none text-white text-sm p-3">
                </div>
                <button id="record-btn" onclick="startRecording()" class="bg-[#00a884] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><span class="material-icons-round">mic</span></button>
                <button id="send-txt-btn" onclick="sendMsg()" class="hidden bg-[#00a884] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><span class="material-icons-round">send</span></button>
            </div>

            <div id="record-ui" class="hidden flex items-center bg-[#1e293b] rounded-full p-2 px-4 w-full">
                <button onclick="deleteRecording()" class="text-red-500"><span class="material-icons-round">delete</span></button>
                <div class="flex-1 px-4 text-xs font-bold text-white animate-pulse">রেকর্ড হচ্ছে...</div>
                <button onclick="stopRecording()" class="text-[#00a884]"><span class="material-icons-round text-3xl">pause_circle</span></button>
                <button id="send-voice-btn" onclick="sendVoice()" class="hidden bg-[#00a884] text-white p-2 rounded-full ml-2"><span class="material-icons-round">send</span></button>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile()">
        </div>
    </div>

    <!-- ডিলিট মেনু -->
    <div id="delete-menu" onclick="this.classList.remove('show')">
        <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-6"></div>
        <button onclick="deleteNow()" class="w-full bg-red-500/20 text-red-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
            <span class="material-icons-round">delete</span> সবার জন্য ডিলিট করুন
        </button>
        <button class="w-full py-4 text-white/50 font-bold mt-2">বাতিল করুন</button>
    </div>

    <!-- ইনকামিং কল -->
    <div id="incoming-ui" class="hidden fixed inset-0 z-[3000] bg-[#0b141a] flex flex-col items-center justify-center text-white text-center p-6">
        <div class="w-32 h-32 rounded-full border-4 border-green-500 mb-8 overflow-hidden shadow-2xl"><img id="caller-img" src="" class="w-full h-full object-cover"></div>
        <h2 id="caller-name" class="text-2xl font-bold mb-12">কল আসছে...</h2>
        <div class="flex gap-12"><button onclick="acceptCall()" class="w-20 h-20 bg-green-500 rounded-full shadow-lg"><span class="material-icons-round text-4xl">videocam</span></button><button onclick="rejectCall()" class="w-20 h-20 bg-red-500 rounded-full shadow-lg"><span class="material-icons-round text-4xl">call_end</span></button></div>
    </div>

    <div id="video-page" class="hidden fixed inset-0 bg-black z-[2500]">
        <video id="remoteVideo" autoplay playsinline></video><video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center"><button onclick="location.reload()" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center shadow-2xl border-4 border-white/10"><span class="material-icons-round text-4xl text-white">call_end</span></button></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY",
            authDomain: "video-3d955.firebaseapp.com",
            projectId: "video-3d955",
            storageBucket: "video-3d955.firebasestorage.app",
            messagingSenderId: "1016513647050",
            appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc = null, localStream, currentChatId, fileData = null;
        let mediaRecorder, audioChunks = [], voiceBlob = null;
        let selectedMsgId = null, audioInstances = {};

        const ringtone = document.getElementById('ringtone'), dialtone = document.getElementById('dialtone');

        function startAudio() { ringtone.play().then(()=>ringtone.pause()); dialtone.play().then(()=>dialtone.pause()); }

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display') ? null : listenForCalls(user.uid);
                await db.collection('users').doc(user.uid).set({ name: user.displayName, photo: user.photoURL, uid: user.uid });
                loadContacts(user.uid);
            }
        });

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function showIdModal() { alert("আপনার আইডি: " + auth.currentUser.uid); navigator.clipboard.writeText(auth.currentUser.uid); }

        function loadContacts(myUid) {
            db.collection('users').doc(myUid).collection('contacts').onSnapshot(snap => {
                const list = document.getElementById('contact-list'); list.innerHTML = '';
                snap.forEach(async doc => {
                    const fData = (await db.collection('users').doc(doc.id).get()).data();
                    if(fData) {
                        list.innerHTML += `<div class="contact-item bg-white/5 p-4 rounded-2xl mb-3 flex items-center gap-3" onclick="openChat('${fData.uid}', '${fData.name}', '${fData.photo}')"><img src="${fData.photo}" class="w-12 h-12 rounded-full border border-indigo-500"><div class="flex-1 text-white font-bold text-sm">${fData.name}</div><span class="material-icons-round text-[#00a884]">chevron_right</span></div>`;
                    }
                });
            });
        }

        async function addNewContact() {
            const id = document.getElementById('target-id').value.trim();
            if(!id || id === auth.currentUser.uid) return alert("সঠিক আইডি দিন");
            await db.collection('users').doc(auth.currentUser.uid).collection('contacts').doc(id).set({ added: true });
            await db.collection('users').doc(id).collection('contacts').doc(auth.currentUser.uid).set({ added: true });
            document.getElementById('target-id').value = '';
        }

        function openChat(id, name, photo) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-img').src = photo;
            document.getElementById('chat-window').style.display = 'flex';
            listenForMsg(id);
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
        function getChatId(fId) { return auth.currentUser.uid < fId ? auth.currentUser.uid + "_" + fId : fId + "_" + auth.currentUser.uid; }

        // --- উন্নত অডিও প্লে/পজ লজিক ---
        function toggleAudio(msgId, url) {
            if (!audioInstances[msgId]) {
                audioInstances[msgId] = new Audio(url);
                audioInstances[msgId].ontimeupdate = () => {
                    const fill = document.getElementById('fill-' + msgId);
                    if(fill) fill.style.width = (audioInstances[msgId].currentTime / audioInstances[msgId].duration) * 100 + "%";
                };
                audioInstances[msgId].onended = () => {
                    document.getElementById('icon-' + msgId).innerText = "play_arrow";
                    audioInstances[msgId].currentTime = 0;
                };
            }

            const audio = audioInstances[msgId];
            const icon = document.getElementById('icon-' + msgId);

            if (audio.paused) {
                audio.play();
                icon.innerText = "pause";
            } else {
                audio.pause();
                icon.innerText = "play_arrow";
            }
        }

        // --- লং প্রেস লজিক (Delete) ---
        let pressTimer;
        function handlePressStart(msgId) {
            pressTimer = setTimeout(() => {
                if(window.navigator.vibrate) window.navigator.vibrate(50);
                selectedMsgId = msgId;
                document.getElementById('delete-menu').classList.add('show');
            }, 800);
        }
        function handlePressEnd() { clearTimeout(pressTimer); }

        async function deleteNow() {
            if(!selectedMsgId) return;
            const chatId = getChatId(currentChatId);
            await db.collection('chats').doc(chatId).collection('messages').doc(selectedMsgId).delete();
            document.getElementById('delete-menu').classList.remove('show');
            selectedMsgId = null;
        }

        function listenForMsg(friendId) {
            db.collection('chats').doc(getChatId(friendId)).collection('messages').orderBy('ts').onSnapshot(s => {
                const div = document.getElementById('messages'); div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data(); const isMe = data.sender === auth.currentUser.uid;
                    const ticks = isMe ? `<span class="status-ticks ${data.seen ? 'seen' : 'unseen'}">${data.seen ? '✓✓' : '✓'}</span>` : '';
                    let mediaHTML = data.media ? `<img src="${data.media}" class="w-full rounded-lg mb-2">` : '';
                    let contentHTML = data.voice ? `<div class="voice-container"><div class="play-btn" onclick="toggleAudio('${d.id}', '${data.voice}')"><span id="icon-${d.id}" class="material-icons-round text-white">play_arrow</span></div><div class="progress-bar"><div id="fill-${d.id}" class="progress-fill"></div></div></div>` : data.text;

                    const msgBubble = document.createElement('div');
                    msgBubble.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                    msgBubble.innerHTML = `${mediaHTML}${contentHTML}${ticks}`;
                    
                    // ইভেন্ট লিসেনার (লং প্রেসের জন্য)
                    if(isMe) {
                        msgBubble.addEventListener('touchstart', () => handlePressStart(d.id));
                        msgBubble.addEventListener('touchend', handlePressEnd);
                        msgBubble.addEventListener('mousedown', () => handlePressStart(d.id));
                        msgBubble.addEventListener('mouseup', handlePressEnd);
                    }

                    div.appendChild(msgBubble);
                    if(!isMe && !data.seen) d.ref.update({seen: true});
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        // --- ভয়েস ও মেসেজ সেন্ড লজিক ---
        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start(); audioChunks = [];
            document.getElementById('normal-input').classList.add('hidden');
            document.getElementById('record-ui').classList.remove('hidden');
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        }
        function stopRecording() {
            mediaRecorder.stop();
            mediaRecorder.onstop = () => {
                voiceBlob = new Blob(audioChunks, { type: 'audio/webm' });
                document.getElementById('send-voice-btn').classList.remove('hidden');
            };
        }
        function deleteRecording() { voiceBlob = null; document.getElementById('normal-input').classList.remove('hidden'); document.getElementById('record-ui').classList.add('hidden'); }
        async function sendVoice() {
            const reader = new FileReader(); reader.readAsDataURL(voiceBlob);
            reader.onload = async () => {
                await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').add({ voice: reader.result, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp(), seen: false });
                deleteRecording();
            };
        }
        async function sendMsg() {
            const text = document.getElementById('msg-input').value;
            if(!text && !fileData) return;
            await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').add({ text: text || "", media: fileData || null, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp(), seen: false });
            document.getElementById('msg-input').value = ''; fileData = null;
        }

        // --- কল লজিক ---
        async function startCall() {
            dialtone.play(); document.getElementById('incoming-ui').classList.add('hidden');
            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(currentChatId).collection('offerCandidates').add(e.candidate.toJSON());
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            await callDoc.set({ offer: { sdp: offer.sdp, type: offer.type }, callerName: auth.currentUser.displayName, callerPhoto: auth.currentUser.photoURL });
            callDoc.onSnapshot(s => { if (s.data()?.answer && !pc.currentRemoteDescription) { dialtone.pause(); document.getElementById('video-page').classList.remove('hidden'); pc.setRemoteDescription(new RTCSessionDescription(s.data().answer)); } });
            db.collection('calls').doc(currentChatId).collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                const data = s.data();
                if (data?.offer && (!pc || !pc.currentRemoteDescription)) {
                    currentChatId = uid;
                    document.getElementById('caller-name').innerText = data.callerName;
                    document.getElementById('caller-img').src = data.callerPhoto;
                    ringtone.play(); document.getElementById('incoming-ui').classList.remove('hidden');
                }
            });
        }

        async function acceptCall() {
            ringtone.pause(); document.getElementById('incoming-ui').classList.add('hidden'); document.getElementById('video-page').classList.remove('hidden');
            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;
            const callDoc = db.collection('calls').doc(auth.currentUser.uid);
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(auth.currentUser.uid).collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            await callDoc.update({ answer: { sdp: answer.sdp, type: answer.type } });
            db.collection('calls').doc(auth.currentUser.uid).collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function rejectCall() { ringtone.pause(); db.collection('calls').doc(auth.currentUser.uid).delete(); document.getElementById('incoming-ui').classList.add('hidden'); }
        function handleFile() { const file = document.getElementById('file-input').files[0]; const reader = new FileReader(); reader.onload = e => { fileData = e.target.result; sendMsg(); }; reader.readAsDataURL(file); }
        document.getElementById('msg-input').oninput = (e) => {
            const s = document.getElementById('send-txt-btn'), r = document.getElementById('record-btn');
            if(e.target.value.trim().length > 0) { s.classList.remove('hidden'); r.classList.add('hidden'); }
            else { s.classList.add('hidden'); r.classList.remove('hidden'); }
        };
    </script>
</body>
</html>
