<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Call Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; background-color: #000; height: 100vh; overflow: hidden;
            background-image: url('bg.jpg'); /* আপনার ব্যাকগ্রাউন্ড ফটো */
            background-size: cover;
            background-position: center;
        }

        .dark-overlay { 
            background: rgba(0, 0, 0, 0.6); 
            height: 100%; width: 100%; 
            display: flex; flex-direction: column; 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 20px; 
        }

        /* কল স্ক্রিন */
        #call-screen { position: fixed; inset: 0; z-index: 9000; background: #0b141a; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .avatar-ring { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00a884; padding: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 168, 132, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0); } }

        /* ভিডিও এরিয়া */
        #video-container { position: fixed; inset: 0; z-index: 8000; display: none; background: #000; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 30px; right: 20px; width: 100px; height: 150px; border-radius: 15px; border: 2px solid white; object-fit: cover; }

        .btn-call { width: 70px; height: 70px; border-radius: 50%; display: flex; items: center; justify-content: center; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="dark-overlay">
        <!-- ১. লগইন/ড্যাশবোর্ড -->
        <div id="auth-ui" class="h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="glass p-8 w-full max-w-sm">
                <h1 class="text-3xl font-bold text-white mb-6 italic">Soyel Call Pro</h1>
                <input id="phone" placeholder="মোবাইল নম্বর লিখুন" class="w-full p-4 bg-black/30 rounded-xl text-white outline-none mb-4">
                <button onclick="login()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">প্রবেশ করুন</button>
            </div>
        </div>

        <div id="main-ui" class="hidden h-screen flex flex-col p-6">
            <header class="flex justify-between items-center mb-10">
                <div class="text-white">
                    <h2 class="font-bold text-xl">Soyel Pro</h2>
                    <p class="text-xs text-gray-400">কলিং ড্যাশবোর্ড</p>
                </div>
                <button onclick="copyMyId()" class="bg-indigo-600 px-4 py-2 rounded-lg text-white text-xs font-bold">MY ID</button>
            </header>

            <div class="flex gap-2 mb-8">
                <input id="target-id" placeholder="বন্ধুর আইডি দিন..." class="flex-1 bg-white/10 p-4 rounded-xl text-white outline-none">
                <button onclick="addFriend()" class="bg-green-600 px-6 rounded-xl text-white font-bold">যোগ</button>
            </div>

            <div id="friend-list" class="flex-1 overflow-y-auto space-y-4">
                <!-- বন্ধুদের লিস্ট এখানে আসবে -->
            </div>
        </div>
    </div>

    <!-- ২. ইনকামিং/আউটগোয়িং কল স্ক্রিন -->
    <div id="call-screen">
        <div class="avatar-ring mb-6">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full rounded-full object-cover">
        </div>
        <h2 id="call-user-name" class="text-2xl font-bold">বন্ধুর নাম...</h2>
        <p id="call-status" class="text-indigo-400 mt-2 uppercase tracking-widest text-xs">Calling...</p>
        
        <div class="mt-20 flex gap-12">
            <button onclick="hangup()" class="btn-call bg-red-600"><span class="material-icons-round text-4xl text-white">call_end</span></button>
            <button id="accept-btn" onclick="acceptCall()" class="hidden btn-call bg-green-500"><span class="material-icons-round text-4xl text-white">videocam</span></button>
        </div>
    </div>

    <!-- ৩. ভিডিও পেজ -->
    <div id="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 w-full flex justify-center">
            <button onclick="hangup()" class="btn-call bg-red-600 shadow-2xl"><span class="material-icons-round text-4xl text-white">call_end</span></button>
        </div>
    </div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script>
        // ফায়ারবেস সেটআপ
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let pc, localStream, currentFriendId;
        const rt = document.getElementById('ringtone'), dt = document.getElementById('dialtone');

        function initAudio() { rt.play().then(()=>rt.pause()); dt.play().then(()=>dt.pause()); }

        // লগইন
        async function login() {
            const p = document.getElementById('phone').value.trim();
            if(!p) return alert("নম্বর দিন");
            const e = p + "@soyel.com";
            try { await auth.signInWithEmailAndPassword(e, "123456"); } 
            catch { await auth.createUserWithEmailAndPassword(e, "123456"); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                db.collection('users').doc(user.uid).set({ uid: user.uid, name: user.email.split('@')[0] }, {merge:true});
                loadFriends(); listenForCalls();
            }
        });

        // বন্ধু লিস্ট ও আইডি কপি সিস্টেম
        function loadFriends() {
            db.collection('users').doc(auth.currentUser.uid).collection('friends').onSnapshot(snap => {
                const list = document.getElementById('friend-list'); list.innerHTML = '';
                snap.forEach(async doc => {
                    const u = (await db.collection('users').doc(doc.id).get()).data();
                    if(!u) return;
                    const div = document.createElement('div');
                    div.className = "glass p-4 flex items-center gap-4 text-white";
                    div.innerHTML = `
                        <div class="flex-1">
                            <h4 class="font-bold">${u.name}</h4>
                            <p class="text-[10px] text-gray-400">ID: ${u.uid.substring(0,10)}...</p>
                        </div>
                        <span onclick="copyId('${u.uid}')" class="material-icons-round text-indigo-400 cursor-pointer">content_copy</span>
                        <button onclick="startCall('${u.uid}', '${u.name}')" class="bg-green-600 p-2 rounded-full"><span class="material-icons-round">videocam</span></button>
                    `;
                    list.appendChild(div);
                });
            });
        }

        async function addFriend() {
            const id = document.getElementById('target-id').value.trim();
            if(id && id !== auth.currentUser.uid) {
                await db.collection('users').doc(auth.currentUser.uid).collection('friends').doc(id).set({added: true});
                document.getElementById('target-id').value = '';
            }
        }

        function copyId(id) { navigator.clipboard.writeText(id); alert("বন্ধুর আইডি কপি হয়েছে!"); }
        function copyMyId() { navigator.clipboard.writeText(auth.currentUser.uid); alert("আপনার আইডি কপি হয়েছে!"); }

        // --- কলিং লজিক (WebRTC) ---
        async function startCall(id, name) {
            currentFriendId = id;
            dt.play();
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('call-user-name').innerText = name;
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;

            const callDoc = db.collection('calls').doc(id);
            pc.onicecandidate = e => e.candidate && callDoc.collection('offerCandidates').add(e.candidate.toJSON());
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await callDoc.set({ offer, status: 'ringing', name: auth.currentUser.email.split('@')[0] });

            callDoc.onSnapshot(s => {
                const d = s.data();
                if(d?.answer && !pc.currentRemoteDescription) {
                    dt.pause();
                    pc.setRemoteDescription(new RTCSessionDescription(d.answer));
                    document.getElementById('call-screen').style.display = 'none';
                    document.getElementById('video-container').style.display = 'block';
                }
            });
        }

        function listenForCalls() {
            db.collection('calls').doc(auth.currentUser.uid).onSnapshot(async s => {
                const d = s.data();
                if(d?.status === 'ringing') {
                    rt.play();
                    document.getElementById('call-screen').style.display = 'flex';
                    document.getElementById('accept-btn').classList.remove('hidden');
                    document.getElementById('call-user-name').innerText = d.name;
                    document.getElementById('call-status').innerText = "Incoming Call...";
                }
                if(!s.exists) hangup();
            });
        }

        async function acceptCall() {
            rt.pause();
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('localVideo').srcObject = localStream;

            const callDoc = db.collection('calls').doc(auth.currentUser.uid);
            pc.onicecandidate = e => e.candidate && callDoc.collection('answerCandidates').add(e.candidate.toJSON());
            
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await callDoc.update({ answer, status: 'connected' });
        }

        function hangup() {
            rt.pause(); dt.pause();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            db.collection('calls').doc(auth.currentUser.uid).delete();
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('accept-btn').classList.add('hidden');
        }
    </script>
</body>
</html>
