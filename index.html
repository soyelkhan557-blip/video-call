<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Messenger Pro</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; background-color: #000; color: white; height: 100vh; overflow: hidden; }

        /* ড্রয়ার ও মেনু */
        #side-drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; display: none; }
        #drawer-content { width: 85%; max-width: 320px; height: 100%; background: #1c1c1e; transition: 0.3s transform; transform: translateX(-100%); padding: 15px; }
        #side-drawer.open { display: block; }
        #side-drawer.open #drawer-content { transform: translateX(0); }

        .drawer-item { display: flex; items: center; gap: 15px; padding: 12px; border-radius: 12px; cursor: pointer; }
        .drawer-item.active { background: rgba(255, 255, 255, 0.08); color: #0084ff; }

        /* চ্যাট লিস্ট */
        .view-section { display: none; height: calc(100vh - 100px); overflow-y: auto; padding: 15px; }
        .view-section.active { display: block; }
        .active-dot { width: 14px; height: 14px; background: #31a24c; border: 2px solid #000; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; }

        /* আর্কাইভ মেনু (Context Menu) */
        #context-menu { position: fixed; bottom: 0; left: 0; right: 0; background: #1c1c1e; border-radius: 25px 25px 0 0; padding: 25px; z-index: 15000; display: none; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .menu-btn { width: 100%; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); font-weight: bold; margin-bottom: 10px; text-align: center; }

        /* চ্যাট উইন্ডো */
        #chat-window { position: fixed; inset: 0; z-index: 5000; display: none; flex-direction: column; background: #000; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble-me { background: #0084ff; border-radius: 18px; padding: 10px 15px; align-self: flex-end; max-width: 80%; }
        .bubble-them { background: #333; border-radius: 18px; padding: 10px 15px; align-self: flex-start; max-width: 80%; }
    </style>
</head>
<body>

    <!-- সাইড মেনু (Drawer) -->
    <div id="side-drawer" onclick="toggleDrawer(false)">
        <div id="drawer-content" onclick="event.stopPropagation()">
            <div class="flex items-center gap-3 mb-8">
                <img id="my-pfp-drawer" class="w-10 h-10 rounded-full object-cover">
                <h4 id="my-name-drawer" class="font-bold text-sm">Loading...</h4>
            </div>
            <div class="space-y-1">
                <div onclick="switchView('home')" class="drawer-item active" id="btn-chats"><span class="material-icons-round">chat</span> <b>Chats</b></div>
                <div onclick="switchView('marketplace')" class="drawer-item"><span class="material-icons-round">storefront</span> <b>Marketplace</b></div>
                <div onclick="switchView('requests')" class="drawer-item"><span class="material-icons-round">message</span> <b>Message requests</b></div>
                <div onclick="switchView('archive')" class="drawer-item" id="btn-archive"><span class="material-icons-round">archive</span> <b>Archive</b></div>
                <div class="text-gray-500 text-xs mt-6 mb-2 px-3">More</div>
                <div onclick="switchView('friend_requests')" class="drawer-item"><span class="material-icons-round">people</span> <b>Friend requests</b></div>
            </div>
        </div>
    </div>

    <!-- মেইন ইউআই -->
    <div id="main-ui" class="flex flex-col h-screen">
        <header class="p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="material-icons-round text-3xl" onclick="toggleDrawer(true)">menu</span>
                <h1 id="view-title" class="text-2xl font-black tracking-tighter">messenger</h1>
            </div>
            <span class="material-icons-round bg-white/10 p-2 rounded-full">edit</span>
        </header>

        <!-- হোম ভিউ (চ্যাট লিস্ট) -->
        <div id="view-home" class="view-section active">
            <div class="flex gap-2 mb-4">
                <input id="friend-id" placeholder="বন্ধুর আইডি দিন..." class="flex-1 bg-[#1c1c1e] p-3 rounded-xl outline-none text-sm">
                <button onclick="addAndChat()" class="bg-[#0084ff] px-6 rounded-xl font-bold">যোগ</button>
            </div>
            <div id="chat-list" class="space-y-4"></div>
        </div>

        <!-- আর্কাইভ ভিউ -->
        <div id="view-archive" class="view-section">
            <h2 class="text-xl font-bold mb-4 text-blue-500">Archived Chats</h2>
            <div id="archive-list" class="space-y-4">
                <p class="text-gray-500 text-center mt-10">কোনো চ্যাট আর্কাইভ করা নেই</p>
            </div>
        </div>

        <!-- মার্কেটপ্লেস ও অন্যান্য -->
        <div id="view-marketplace" class="view-section"><h2 class="text-xl font-bold mb-4">Marketplace</h2><p class="text-gray-500 text-center mt-10">পণ্য লোড হচ্ছে...</p></div>
        <div id="view-requests" class="view-section"><p class="text-gray-500 text-center mt-10">মেসেজ রিকোয়েস্ট নেই</p></div>

        <!-- বটম বার -->
        <div class="mt-auto border-t border-white/5 flex justify-around py-3 pb-6">
            <div onclick="switchView('home')" class="text-blue-500 text-center"><span class="material-icons-round text-3xl">chat</span><br><span class="text-[10px]">Chats</span></div>
            <div onclick="switchView('friend_requests')" class="text-gray-500 text-center"><span class="material-icons-round text-3xl">people</span><br><span class="text-[10px]">Stories</span></div>
        </div>
    </div>

    <!-- আর্কাইভ মেনু (Context Menu) -->
    <div id="context-menu" onclick="hideContextMenu()">
        <button id="archive-action-btn" class="menu-btn text-blue-500">Archive Chat</button>
        <button class="menu-btn text-white" onclick="hideContextMenu()">Cancel</button>
    </div>

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-4 flex items-center gap-4 border-b border-white/5">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" class="w-10 h-10 rounded-full object-cover">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4><span class="text-green-500 text-[9px] uppercase">Online</span></div>
            <button onclick="startCall()"><span class="material-icons-round text-blue-500 text-2xl">videocam</span></button>
        </div>
        <div id="messages"></div>
        <div class="p-4 flex items-center gap-3 mb-6">
            <input id="msg-input" placeholder="Aa" class="flex-1 bg-white/10 py-2 px-4 rounded-full outline-none text-sm text-white">
            <button onclick="sendTextMsg()"><span class="material-icons-round text-blue-500 text-3xl">send</span></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let currentChatId, selectedFriendId, isArchiveMode = false;

        function toggleDrawer(open) {
            const dr = document.getElementById('side-drawer');
            if(open) dr.classList.add('open'); else dr.classList.remove('open');
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            toggleDrawer(false);
            if(viewName === 'archive') loadArchiveList();
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                const name = user.email.split('@')[0];
                const pfp = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                document.getElementById('my-name-drawer').innerText = name;
                document.getElementById('my-pfp-drawer').src = pfp;
                loadChatList();
            } else {
                let p = prompt("নম্বর দিন:");
                if(p) auth.signInWithEmailAndPassword(p+"@soyel.com", "123456").catch(()=>auth.createUserWithEmailAndPassword(p+"@soyel.com", "123456"));
            }
        });

        // চ্যাট লিস্ট (আর্কাইভ ছাড়া)
        function loadChatList() {
            db.collection('users').doc(auth.currentUser.uid).collection('friends').where('archived', '==', false).onSnapshot(snap => {
                const list = document.getElementById('chat-list'); list.innerHTML = '';
                snap.forEach(async d => {
                    const u = (await db.collection('users').doc(d.id).get()).data();
                    if(!u) return;
                    renderUser(list, u, false);
                });
            });
        }

        // আর্কাইভ লিস্ট
        function loadArchiveList() {
            db.collection('users').doc(auth.currentUser.uid).collection('friends').where('archived', '==', true).onSnapshot(snap => {
                const list = document.getElementById('archive-list'); list.innerHTML = '';
                if(snap.empty) list.innerHTML = '<p class="text-gray-500 text-center mt-10">কোনো চ্যাট আর্কাইভ করা নেই</p>';
                snap.forEach(async d => {
                    const u = (await db.collection('users').doc(d.id).get()).data();
                    if(!u) return;
                    renderUser(list, u, true);
                });
            });
        }

        function renderUser(container, u, isArchived) {
            const item = document.createElement('div');
            item.className = "flex items-center gap-4 p-2 active:bg-white/5 rounded-xl transition-all relative";
            item.innerHTML = `<div class="relative"><img src="${u.photo}" class="w-14 h-14 rounded-full object-cover"><div class="active-dot"></div></div><div class="flex-1"><h4 class="font-bold text-sm">${u.name}</h4><p class="text-xs text-gray-500">${isArchived ? '[আর্কাইভ করা]' : 'সরাসরি চ্যাট করুন...'}</p></div>`;
            
            // ক্লিক করলে চ্যাট ওপেন
            item.onclick = () => openChat(u.uid, u.name, u.photo);
            
            // চেপে ধরলে মেনু ওপেন (Long Press)
            let pressTimer;
            item.onmousedown = item.ontouchstart = (e) => {
                pressTimer = setTimeout(() => showContextMenu(u.uid, isArchived), 700);
            };
            item.onmouseup = item.ontouchend = () => clearTimeout(pressTimer);
            
            container.appendChild(item);
        }

        function showContextMenu(uid, isArchived) {
            selectedFriendId = uid;
            isArchiveMode = isArchived;
            const btn = document.getElementById('archive-action-btn');
            btn.innerText = isArchived ? "Unarchive Chat" : "Archive Chat";
            btn.onclick = toggleArchiveStatus;
            document.getElementById('context-menu').style.display = 'block';
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function hideContextMenu() { document.getElementById('context-menu').style.display = 'none'; }

        async function toggleArchiveStatus() {
            const status = !isArchiveMode;
            await db.collection('users').doc(auth.currentUser.uid).collection('friends').doc(selectedFriendId).update({ archived: status });
            hideContextMenu();
            alert(status ? "চ্যাট আর্কাইভ করা হয়েছে" : "চ্যাট হোম স্ক্রিনে ফিরে গেছে");
        }

        // চ্যাট উইন্ডো লজিক
        function openChat(id, name, img) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-img').src = img;
            document.getElementById('chat-window').style.display = 'flex';
            listenMessages();
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function listenMessages() {
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            db.collection('chats').doc(cid).collection('messages').orderBy('ts').onSnapshot(snap => {
                const mDiv = document.getElementById('messages'); mDiv.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data(), isMe = data.sender === auth.currentUser.uid;
                    const b = document.createElement('div'); b.className = isMe ? 'bubble-me' : 'bubble-them';
                    b.innerText = data.content;
                    mDiv.appendChild(b);
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
        }

        async function sendTextMsg() {
            const val = document.getElementById('msg-input').value; if(!val) return;
            const cid = auth.currentUser.uid < currentChatId ? auth.currentUser.uid + "_" + currentChatId : currentChatId + "_" + auth.currentUser.uid;
            await db.collection('chats').doc(cid).collection('messages').add({ sender: auth.currentUser.uid, content: val, ts: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('msg-input').value = '';
        }

        async function addAndChat() {
            const id = document.getElementById('friend-id').value.trim();
            const doc = await db.collection('users').doc(id).get();
            if(doc.exists) {
                await db.collection('users').doc(auth.currentUser.uid).collection('friends').doc(id).set({added: true, archived: false});
                openChat(id, doc.data().name, doc.data().photo);
            }
        }
    </script>
</body>
</html>
