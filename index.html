<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Pro Messenger</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-color: #0b141a; height: 100vh; color: white; }
        .bg-app { background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; }
        
        /* কল স্ক্রিন ডিজাইন (মেসেঞ্জার স্টাইল) */
        .call-screen { position: fixed; inset: 0; z-index: 5000; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .profile-ring { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #4f46e5; padding: 5px; animation: pulse 2s infinite; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(79, 70, 229, 0); } 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); } }
        
        .hangup-btn { width: 75px; height: 75px; background: #ff3b30; border-radius: 50%; display: flex; items: center; justify-content: center; box-shadow: 0 10px 30px rgba(255, 59, 48, 0.4); }
        .accept-btn { width: 75px; height: 75px; background: #4cd964; border-radius: 50%; display: flex; items: center; justify-content: center; box-shadow: 0 10px 30px rgba(76, 217, 100, 0.4); }

        /* ভিডিওর জন্য */
        #remoteVideo { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 30px; right: 20px; width: 110px; height: 160px; border-radius: 15px; border: 2px solid white; object-fit: cover; z-index: 10; }
        
        /* টোস্ট নোটিফিকেশন */
        #custom-toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 9999; transition: 0.4s; opacity: 0; }
        #custom-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-app" onclick="setupAudio()">

    <!-- ১. টোস্ট নোটিফিকেশন -->
    <div id="custom-toast" class="w-[90%] max-w-[320px]">
        <div class="bg-white/10 backdrop-blur-md border border-white/20 p-4 rounded-full flex items-center gap-3 shadow-2xl">
            <span class="material-icons-round text-indigo-400">info</span>
            <span id="toast-text" class="text-sm font-medium"></span>
        </div>
    </div>

    <!-- ২. কলিং স্ক্রিন (Outgoing) -->
    <div id="calling-ui" class="hidden call-screen">
        <div class="profile-ring mb-8">
            <img id="call-target-img" src="" class="profile-img">
        </div>
        <h2 id="call-target-name" class="text-2xl font-bold mb-2">...</h2>
        <p id="call-status" class="text-indigo-400 font-bold tracking-widest uppercase text-xs mb-20">Calling...</p>
        <button onclick="hangup()" class="hangup-btn">
            <span class="material-icons-round text-4xl">call_end</span>
        </button>
    </div>

    <!-- ৩. ইনকামিং কল স্ক্রিন (Incoming) -->
    <div id="incoming-ui" class="hidden call-screen">
        <div class="profile-ring mb-8">
            <img id="caller-img" src="" class="profile-img">
        </div>
        <h2 id="caller-name" class="text-2xl font-bold mb-2">...</h2>
        <p class="text-green-400 font-bold tracking-widest uppercase text-xs mb-20">Incoming Video Call</p>
        <div class="flex gap-12">
            <button onclick="hangup()" class="hangup-btn">
                <span class="material-icons-round text-4xl">close</span>
            </button>
            <button onclick="acceptCall()" class="accept-btn">
                <span class="material-icons-round text-4xl">videocam</span>
            </button>
        </div>
    </div>

    <!-- ৪. ভিডিও কল পেজ (Active Call) -->
    <div id="video-page" class="hidden fixed inset-0 z-[6000] bg-black">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-6">
            <button id="toggle-mic" class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center">
                <span class="material-icons-round">mic</span>
            </button>
            <button onclick="hangup()" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center shadow-2xl">
                <span class="material-icons-round text-4xl text-white">call_end</span>
            </button>
            <button id="toggle-cam" class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center">
                <span class="material-icons-round">videocam</span>
            </button>
        </div>
    </div>

    <!-- ড্যাশবোর্ড এবং চ্যাট (সংক্ষিপ্ত) -->
    <div class="h-screen flex flex-col p-4">
        <div id="login-page" class="flex-1 flex flex-col items-center justify-center text-center">
            <div class="glass p-10 w-full max-w-sm">
                <h1 class="text-3xl font-bold mb-6">Soyel Pro</h1>
                <input id="login-email" placeholder="Mobile Number" class="w-full p-4 bg-white/5 rounded-2xl mb-4 border border-white/10">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 bg-white/5 rounded-2xl mb-6 border border-white/10">
                <button onclick="loginEmail()" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold">Login</button>
            </div>
        </div>

        <div id="dashboard" class="hidden flex-1 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <img id="my-photo" class="w-12 h-12 rounded-full border-2 border-indigo-500">
                <button onclick="showIdModal()" class="text-xs bg-indigo-600 px-4 py-2 rounded-lg">MY ID</button>
            </div>
            <div class="flex gap-2 mb-6">
                <input id="target-id" placeholder="Friend's ID" class="flex-1 p-4 bg-white/5 rounded-2xl outline-none">
                <button onclick="addNewContact()" class="bg-indigo-600 px-6 rounded-2xl font-bold">Add</button>
            </div>
            <div id="contact-list" class="flex-1 overflow-y-auto"></div>
        </div>
    </div>

    <!-- চ্যাট উইন্ডো -->
    <div id="chat-window" class="hidden fixed inset-0 bg-[#0b141a] z-[2000] flex flex-col">
        <div class="p-4 flex items-center gap-4 border-b border-white/10">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" class="w-10 h-10 rounded-full">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm">...</h4></div>
            <button onclick="initCallFlow()" class="p-2 text-indigo-400"><span class="material-icons-round text-3xl">videocam</span></button>
        </div>
        <div id="messages" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>
        <div class="p-4 flex gap-2">
            <input id="msg-input" placeholder="Type message..." class="flex-1 p-3 bg-white/5 rounded-full outline-none">
            <button onclick="sendMsg()" class="bg-indigo-600 w-12 h-12 rounded-full flex items-center justify-center"><span class="material-icons-round">send</span></button>
        </div>
    </div>

    <div id="id-modal" class="hidden fixed inset-0 z-[9000] bg-black/90 flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center">
            <p id="my-id-display" class="font-mono text-xs break-all bg-black/50 p-4 rounded-xl mb-4"></p>
            <button onclick="copyId()" class="w-full bg-white text-indigo-900 py-3 rounded-xl font-bold">Copy ID</button>
        </div>
    </div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc, localStream, currentChatId;
        const rt = document.getElementById('ringtone'), dt = document.getElementById('dialtone');

        function setupAudio() { rt.play().then(()=>rt.pause()); dt.play().then(()=>dt.pause()); }
        function showToast(m) { const t = document.getElementById('custom-toast'); document.getElementById('toast-text').innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

        async function loginEmail() {
            const e = document.getElementById('login-email').value + "@soyel.com", p = document.getElementById('login-pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { showToast(err.message); } }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display').innerText = user.uid;
                db.collection('users').doc(user.uid).set({ name: user.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png", uid: user.uid });
                listenForCalls(user.uid); loadContacts(user.uid);
            }
        });

        function loadContacts(uid) {
            db.collection('users').doc(uid).collection('contacts').onSnapshot(snap => {
                const list = document.getElementById('contact-list'); list.innerHTML = '';
                snap.forEach(async d => {
                    const ud = (await db.collection('users').doc(d.id).get()).data();
                    if(ud) {
                        const div = document.createElement('div');
                        div.className = "flex items-center gap-4 bg-white/5 p-4 rounded-2xl mb-3";
                        div.innerHTML = `<img src="${ud.photo}" class="w-12 h-12 rounded-full"><div class="flex-1 font-bold">${ud.name}</div>`;
                        div.onclick = () => openChat(ud.uid, ud.name, ud.photo);
                        list.appendChild(div);
                    }
                });
            });
        }

        async function addNewContact() {
            const id = document.getElementById('target-id').value.trim();
            if(!id || id === auth.currentUser.uid) return showToast("Invalid ID");
            await db.collection('users').doc(auth.currentUser.uid).collection('contacts').doc(id).set({added: true});
            showToast("Added Successfully");
        }

        function openChat(id, n, p) {
            currentChatId = id;
            document.getElementById('chat-user-name').innerText = n;
            document.getElementById('chat-user-img').src = p;
            document.getElementById('chat-window').classList.remove('hidden');
        }
        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        // --- কলিং লজিক ---
        async function initCallFlow() {
            dt.play();
            document.getElementById('call-target-name').innerText = document.getElementById('chat-user-name').innerText;
            document.getElementById('call-target-img').src = document.getElementById('chat-user-img').src;
            document.getElementById('calling-ui').classList.remove('hidden');

            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            
            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(currentChatId).collection('offerCandidates').add(e.candidate.toJSON());
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            const callDoc = db.collection('calls').doc(currentChatId);
            await callDoc.set({ 
                offer, 
                callerName: auth.currentUser.email.split('@')[0], 
                callerPhoto: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
                status: 'ringing' 
            });

            callDoc.onSnapshot(s => {
                const data = s.data();
                if(data?.status === 'ringing') document.getElementById('call-status').innerText = "Ringing...";
                if(data?.answer && !pc.currentRemoteDescription) {
                    dt.pause();
                    document.getElementById('calling-ui').classList.add('hidden');
                    document.getElementById('video-page').classList.remove('hidden');
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });
            db.collection('calls').doc(currentChatId).collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                const data = s.data();
                if(data?.offer && data?.status === 'ringing') {
                    currentChatId = uid;
                    document.getElementById('caller-name').innerText = data.callerName;
                    document.getElementById('caller-img').src = data.callerPhoto;
                    rt.play();
                    document.getElementById('incoming-ui').classList.remove('hidden');
                }
                if(!s.exists || data?.status === 'ended') hangup();
            });
        }

        async function acceptCall() {
            rt.pause();
            document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('video-page').classList.remove('hidden');
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            pc.onicecandidate = e => e.candidate && db.collection('calls').doc(auth.currentUser.uid).collection('answerCandidates').add(e.candidate.toJSON());
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];

            const callDoc = db.collection('calls').doc(auth.currentUser.uid);
            const callData = (await callDoc.get()).data();
            await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await callDoc.update({ answer, status: 'connected' });

            db.collection('calls').doc(auth.currentUser.uid).collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        async function hangup() {
            rt.pause(); dt.pause();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            await db.collection('calls').doc(auth.currentUser.uid).delete();
            if(currentChatId) await db.collection('calls').doc(currentChatId).delete();
            document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('calling-ui').classList.add('hidden');
            document.getElementById('video-page').classList.add('hidden');
        }

        function showIdModal() { document.getElementById('id-modal').classList.remove('hidden'); }
        function copyId() { navigator.clipboard.writeText(document.getElementById('my-id-display').innerText); showToast("ID Copied!"); }
    </script>
</body>
</html>
