<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soyel Pro Messenger</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; background-color: #0f172a; height: 100vh; -webkit-tap-highlight-color: transparent; }
        .bg-app { background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        .dark-overlay { background: rgba(0, 0, 0, 0.6); height: 100%; width: 100%; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 25px; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 20px; border: 2px solid #fff; z-index: 10; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #chat-window { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; background-image: url('bg.jpg'); background-size: cover; background-position: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.75); }
        
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 85%; font-size: 15px; color: white; position: relative; cursor: pointer; }
        .bubble-me { background: #075e54; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #1f2c33; align-self: flex-start; border-bottom-left-radius: 4px; }
        .media-msg { max-width: 200px; border-radius: 15px; margin-bottom: 5px; }
        
        .voice-container { display: flex; align-items: center; gap: 10px; min-width: 180px; }
        .play-btn { width: 35px; height: 35px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: #34d399; width: 0%; transition: width 0.1s linear; }
        
        .input-bar { padding: 10px 10px 35px 10px; background: #0b141a; border-top: 1px solid rgba(255,255,255,0.05); }
        .input-container { display: flex; align-items: center; gap: 8px; position: relative; }
        .text-input-field { flex: 1; background: #1f2c33; border-radius: 30px; display: flex; align-items: center; padding: 0 10px; }
        input#msg-input { background: transparent; border: none; outline: none; color: white; flex: 1; padding: 12px 0; font-size: 15px; }
        
        .recording-ui { position: absolute; inset: 0; background: #0b141a; display: none; align-items: center; border-radius: 30px; z-index: 10; padding-right: 5px; }
        .slide-cancel { color: #8696a0; font-size: 12px; margin-left: auto; animation: slideLeft 1.5s infinite; }
        @keyframes slideLeft { 0% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(-15px); opacity: 0; } }
        
        /* কল স্ক্রিন ডিজাইন */
        .call-profile-circle { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #4f46e5; padding: 5px; margin-bottom: 20px; }
        .call-profile-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .hangup-circle { width: 75px; height: 75px; background: #ff3b30; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(255,0,0,0.3); }
        .accept-circle { width: 75px; height: 75px; background: #4cd964; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,255,0,0.3); }

        /* ডিলিট মেনু */
        #delete-menu { position: fixed; bottom: 0; left: 0; right: 0; background: #1f2c33; border-radius: 30px 30px 0 0; padding: 25px 20px; z-index: 5000; display: none; transition: 0.3s; transform: translateY(100%); }
        #delete-menu.show { display: block; transform: translateY(0); }
        .menu-btn { width: 100%; padding: 16px; border-radius: 20px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }

        #custom-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 9999; transition: 0.4s; opacity: 0; pointer-events: none; width: 90%; max-width: 350px; }
        #custom-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-content { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px 20px; border-radius: 100px; color: white; display: flex; align-items: center; gap: 12px; }
    </style>
</head>
<body onclick="startAudio()" class="bg-app">
    
    <div id="custom-toast"><div class="toast-content"><span class="material-icons-round text-indigo-400">notifications_active</span><span id="toast-text" class="text-sm font-medium"></span></div></div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <div class="dark-overlay">
        <!-- ১. লগইন পেজ -->
        <div id="login-page" class="h-screen flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
            <div class="glass p-8 w-full max-w-sm">
                <img src="https://cdn-icons-png.flaticon.com/512/3649/3649460.png" class="w-16 h-16 mb-4 mx-auto">
                <h1 class="text-2xl font-bold text-white mb-6 uppercase italic">Soyel Pro</h1>
                <input id="login-email" type="text" placeholder="মোবাইল নম্বর" class="w-full p-4 bg-white/10 rounded-xl text-white outline-none mb-3">
                <input id="login-pass" type="password" placeholder="পাসওয়ার্ড" class="w-full p-4 bg-white/10 rounded-xl text-white outline-none mb-4">
                <button onclick="loginEmail()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">লগইন / সাইন আপ</button>
            </div>
        </div>

        <!-- ২. ড্যাশবোর্ড -->
        <div id="dashboard" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
            <header class="flex justify-between items-center text-white mb-10"><img id="my-photo" src="" class="w-11 h-11 rounded-full border-2 border-indigo-400"><button onclick="showIdModal()" class="bg-[#4f46e5] px-5 py-2 rounded-xl text-xs font-bold uppercase">MY ID</button></header>
            <div class="space-y-6 overflow-y-auto flex-1 pb-20">
                <div class="flex gap-2"><input id="target-id" type="text" placeholder="বন্ধুর আইডি দিন" class="flex-1 p-4 glass text-white text-xs outline-none"><button onclick="addNewContact()" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold shadow-lg">যোগ</button></div>
                <div id="contact-list"></div>
            </div>
        </div>
    </div>

    <!-- ৩. চ্যাট উইন্ডো -->
    <div id="chat-window">
        <div class="p-4 bg-[#0b141a] flex items-center gap-3 text-white border-b border-white/5">
            <button onclick="closeChat()"><span class="material-icons-round">arrow_back</span></button>
            <img id="chat-user-img" src="" class="w-10 h-10 rounded-full">
            <div class="flex-1"><h4 id="chat-user-name" class="font-bold text-sm truncate">...</h4><span class="text-green-500 text-[10px] uppercase font-bold tracking-widest">অনলাইন</span></div>
            <button onclick="initCallFlow()"><span class="material-icons-round text-indigo-400 text-3xl">videocam</span></button>
        </div>
        <div id="messages"></div>
        
        <!-- চ্যাট ইনপুট বার (ভয়েস এবং ফাইল সহ) -->
        <div class="input-bar">
            <div class="input-container">
                <div id="normal-input" class="text-input-field">
                    <button onclick="document.getElementById('file-input').click()" class="text-[#8696a0] pr-2"><span class="material-icons-round">add_circle</span></button>
                    <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." autocomplete="off">
                </div>
                
                <!-- ভয়েস রেকর্ডিং ওভারলে -->
                <div id="recording-overlay" class="recording-ui">
                    <span class="material-icons-round text-red-500 animate-pulse pl-4">mic</span>
                    <span id="rec-timer" class="text-white font-bold ml-10">0:00</span>
                    <span class="slide-cancel">বাতিল করতে টানুন <span class="material-icons-round text-sm">chevron_left</span></span>
                    <button id="v-send-btn" onclick="stopVoiceRecord(true)" class="bg-[#00a884] text-white w-10 h-10 rounded-full flex items-center justify-center ml-auto mr-2"><span class="material-icons-round text-sm">send</span></button>
                </div>
                
                <button id="record-btn" onclick="startVoiceRecord()" class="bg-[#00a884] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg ml-2"><span class="material-icons-round">mic</span></button>
                <button id="send-btn" onclick="sendMsg()" class="hidden bg-[#00a884] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg ml-2"><span class="material-icons-round">send</span></button>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*,video/*" onchange="handleFile()">
        </div>
    </div>

    <!-- ৪. কল স্ক্রিন -->
    <div id="incoming-ui" class="hidden fixed inset-0 z-[3000] bg-[#0b141a] flex flex-col items-center justify-center text-white p-6">
        <div class="call-profile-circle"><img id="caller-img" src=""></div>
        <h2 id="caller-name" class="text-2xl font-bold mb-10">...</h2>
        <div class="flex gap-16 mt-10">
            <button onclick="hangup()" class="hangup-circle"><span class="material-icons-round text-4xl">close</span></button>
            <button onclick="acceptCall()" class="accept-circle"><span class="material-icons-round text-4xl">videocam</span></button>
        </div>
    </div>

    <div id="calling-ui" class="hidden fixed inset-0 z-[3000] bg-[#0b141a] flex flex-col items-center justify-center text-white p-6">
        <div class="call-profile-circle"><img id="target-img-call" src=""></div>
        <h2 id="target-name-call" class="text-2xl font-bold mb-2">...</h2>
        <p class="text-indigo-400 font-bold tracking-widest text-xs uppercase animate-pulse">Calling...</p>
        <button onclick="hangup()" class="hangup-circle mt-20"><span class="material-icons-round text-4xl">call_end</span></button>
    </div>

    <div id="video-page" class="hidden fixed inset-0 bg-black z-[2500]">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute bottom-12 left-0 right-0 flex justify-center">
            <button onclick="hangup()" class="hangup-circle"><span class="material-icons-round text-4xl text-white">call_end</span></button>
        </div>
    </div>

    <!-- ৫. ডিলিট মেনু -->
    <div id="delete-menu">
        <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
        <button onclick="deleteNow()" class="menu-btn bg-red-500/20 text-red-500">সবার জন্য ডিলিট</button>
        <button onclick="closeDeleteMenu()" class="menu-btn bg-white/5 text-white">বাতিল</button>
    </div>

    <div id="id-modal" class="hidden fixed inset-0 z-[5000] bg-black/90 flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="glass p-8 w-full max-w-sm text-center text-white" onclick="event.stopPropagation()">
            <p id="my-id-display" class="font-mono text-xs break-all bg-black/40 p-5 rounded-2xl mb-6">লোড হচ্ছে...</p>
            <button onclick="copyMyId()" class="w-full bg-white text-indigo-600 py-4 rounded-2xl font-bold">কপি করুন</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCv0-AIv6osWK_sPelrG_u-socZdlJfFDY", authDomain: "video-3d955.firebaseapp.com", projectId: "video-3d955", storageBucket: "video-3d955.firebasestorage.app", messagingSenderId: "1016513647050", appId: "1:1016513647050:web:c089c4da5f6c00eb53bf33" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let pc = null, localStream, currentChatId, fileData = null, selectedMsgId = null, audioInstances = {}, mediaRecorder = null, voiceStream = null, audioChunks = [], timerInterval, startTime;
        const ringtone = document.getElementById('ringtone'), dialtone = document.getElementById('dialtone');

        function showToast(msg) { const t = document.getElementById('custom-toast'); document.getElementById('toast-text').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        function startAudio() { ringtone.play().then(()=>ringtone.pause()); dialtone.play().then(()=>dialtone.pause()); }

        // --- লগইন এবং কন্টাক্ট ---
        async function loginEmail() {
            const input = document.getElementById('login-email').value.trim(), pass = document.getElementById('login-pass').value;
            if(!input || !pass) return showToast("সবগুলো ঘর পূরণ করুন");
            const email = input.includes('@') ? input : input + "@soyel.com";
            try { await auth.createUserWithEmailAndPassword(email, pass); } 
            catch(e) { if(e.code === 'auth/email-already-in-use') { try { await auth.signInWithEmailAndPassword(email, pass); } catch(err) { showToast("পাসওয়ার্ড ভুল!"); } } else { showToast(e.message); } }
        }

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('my-id-display').innerText = user.uid;
                await db.collection('users').doc(user.uid).set({ name: user.email.split('@')[0], photo: "https://cdn-icons-png.flaticon.com/512/3649/3649460.png", uid: user.uid });
                listenForCalls(user.uid); loadContacts(user.uid);
            }
        });

        function loadContacts(myUid) { db.collection('users').doc(myUid).collection('contacts').onSnapshot(snap => { const list = document.getElementById('contact-list'); list.innerHTML = ''; snap.forEach(async doc => { const fDoc = await db.collection('users').doc(doc.id).get(); const fData = fDoc.data(); if(fData) { const item = document.createElement('div'); item.className = "bg-white/5 p-4 rounded-2xl mb-3 flex items-center gap-3"; item.innerHTML = `<img src="${fData.photo}" class="w-12 h-12 rounded-full border border-indigo-500"><div class="flex-1 text-white font-bold text-sm">${fData.name}</div>`; item.onclick = () => openChat(fData.uid, fData.name, fData.photo); list.appendChild(item); } }); }); }
        async function addNewContact() { const id = document.getElementById('target-id').value.trim(); if(!id || id === auth.currentUser.uid) return showToast("সঠিক আইডি দিন"); await db.collection('users').doc(auth.currentUser.uid).collection('contacts').doc(id).set({ added: true }); document.getElementById('target-id').value = ''; showToast("বন্ধু যুক্ত হয়েছে"); }

        // --- চ্যাট মেসেজ সিস্টেম ---
        function getChatId(fId) { return auth.currentUser.uid < fId ? auth.currentUser.uid + "_" + fId : fId + "_" + auth.currentUser.uid; }
        function openChat(id, name, photo) { currentChatId = id; document.getElementById('chat-user-name').innerText = name; document.getElementById('chat-user-img').src = photo; document.getElementById('chat-window').style.display = 'flex'; listenForMsg(id); }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function listenForMsg(friendId) {
            const chatId = getChatId(friendId);
            db.collection('chats').doc(chatId).collection('messages').orderBy('ts').onSnapshot(s => {
                const div = document.getElementById('messages'); div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data(), isMe = data.sender === auth.currentUser.uid;
                    let mHTML = data.media ? `<img src="${data.media}" class="media-msg shadow-lg">` : '';
                    let cHTML = data.voice ? `<div class="voice-container" onclick="toggleAudio('${d.id}', '${data.voice}')"><div class="play-btn"><span id="icon-${d.id}" class="material-icons-round text-white">play_arrow</span></div><div class="progress-bar"><div id="fill-${d.id}" class="progress-fill"></div></div></div>` : `<div>${data.text || ""}</div>`;
                    const b = document.createElement('div');
                    b.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                    b.innerHTML = mHTML + cHTML;
                    if(isMe) { b.oncontextmenu = (e) => { e.preventDefault(); selectedMsgId = d.id; document.getElementById('delete-menu').classList.add('show'); }; }
                    div.appendChild(b);
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function sendMsg() {
            const t = document.getElementById('msg-input').value; if(!t && !fileData) return;
            await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').add({ text: t || "", media: fileData || null, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('msg-input').value = ''; fileData = null;
        }

        function handleFile() { const f = document.getElementById('file-input').files[0]; const r = new FileReader(); r.onload = e => { fileData = e.target.result; sendMsg(); }; r.readAsDataURL(f); }

        // --- ভয়েস রেকর্ড লজিক ---
        async function startVoiceRecord() {
            try {
                voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(voiceStream); audioChunks = []; startTime = Date.now();
                document.getElementById('recording-overlay').style.display = 'flex';
                timerInterval = setInterval(() => { const sec = Math.floor((Date.now() - startTime) / 1000); document.getElementById('rec-timer').innerText = `0:${sec < 10 ? '0' : ''}${sec}`; }, 1000);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.start();
            } catch(e) { showToast("মাইক্রোফোন এক্সেস নেই!"); }
        }

        function stopVoiceRecord(shouldSend) {
            if(!mediaRecorder) return;
            mediaRecorder.onstop = async () => {
                if(shouldSend) {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = new FileReader(); r.readAsDataURL(blob);
                    r.onload = async () => { await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').add({ voice: r.result, sender: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp() }); };
                }
                voiceStream.getTracks().forEach(t => t.stop());
                document.getElementById('recording-overlay').style.display = 'none';
                clearInterval(timerInterval);
            };
            mediaRecorder.stop();
        }

        function toggleAudio(msgId, url) {
            if (!audioInstances[msgId]) {
                audioInstances[msgId] = new Audio(url);
                audioInstances[msgId].ontimeupdate = () => { document.getElementById('fill-' + msgId).style.width = (audioInstances[msgId].currentTime / audioInstances[msgId].duration) * 100 + "%"; };
                audioInstances[msgId].onended = () => { document.getElementById('icon-' + msgId).innerText = "play_arrow"; };
            }
            const a = audioInstances[msgId];
            if (a.paused) { a.play(); document.getElementById('icon-' + msgId).innerText = "pause"; } else { a.pause(); document.getElementById('icon-' + msgId).innerText = "play_arrow"; }
        }

        // --- ডিলিট মেনু লজিক ---
        function closeDeleteMenu() { document.getElementById('delete-menu').classList.remove('show'); }
        async function deleteNow() { if(selectedMsgId) { await db.collection('chats').doc(getChatId(currentChatId)).collection('messages').doc(selectedMsgId).delete(); closeDeleteMenu(); } }

        // --- কলিং সিস্টেম ---
        async function initCallFlow() {
            dialtone.play();
            document.getElementById('target-name-call').innerText = document.getElementById('chat-user-name').innerText;
            document.getElementById('target-img-call').src = document.getElementById('chat-user-img').src;
            document.getElementById('calling-ui').classList.remove('hidden');
            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            const callDoc = db.collection('calls').doc(currentChatId);
            pc.onicecandidate = e => e.candidate && callDoc.collection('offerCandidates').add(e.candidate.toJSON());
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await callDoc.set({ offer, status: 'ringing', callerName: auth.currentUser.email.split('@')[0], callerPhoto: "https://cdn-icons-png.flaticon.com/512/3649/3649460.png" });
            callDoc.onSnapshot(s => {
                const data = s.data();
                if (data?.answer && !pc.currentRemoteDescription) {
                    dialtone.pause(); document.getElementById('calling-ui').classList.add('hidden');
                    document.getElementById('video-page').classList.remove('hidden');
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });
            callDoc.collection('answerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        function listenForCalls(uid) {
            db.collection('calls').doc(uid).onSnapshot(async s => {
                const data = s.data();
                if (data?.offer && data?.status === 'ringing') {
                    currentChatId = uid;
                    document.getElementById('caller-name').innerText = data.callerName;
                    document.getElementById('caller-img').src = data.callerPhoto;
                    ringtone.play(); document.getElementById('incoming-ui').classList.remove('hidden');
                }
                if (!s.exists || data?.status === 'ended') hangup();
            });
        }

        async function acceptCall() {
            ringtone.pause(); document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('video-page').classList.remove('hidden');
            pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            const callDoc = db.collection('calls').doc(auth.currentUser.uid);
            pc.onicecandidate = e => e.candidate && callDoc.collection('answerCandidates').add(e.candidate.toJSON());
            const offer = (await callDoc.get()).data().offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await callDoc.update({ answer, status: 'connected' });
            callDoc.collection('offerCandidates').onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        async function hangup() {
            ringtone.pause(); dialtone.pause();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close(); pc = null;
            await db.collection('calls').doc(auth.currentUser.uid).delete();
            if(currentChatId) await db.collection('calls').doc(currentChatId).delete();
            document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('calling-ui').classList.add('hidden');
            document.getElementById('video-page').classList.add('hidden');
        }

        function showIdModal() { document.getElementById('id-modal').classList.remove('hidden'); }
        function copyMyId() { navigator.clipboard.writeText(document.getElementById('my-id-display').innerText); showToast('ID কপি হয়েছে!'); }
        
        // সেন্ড বাটন কন্ট্রোল
        document.getElementById('msg-input').oninput = (e) => {
            const s = document.getElementById('send-btn'), r = document.getElementById('record-btn');
            if(e.target.value.trim().length > 0) { s.classList.remove('hidden'); r.classList.add('hidden'); }
            else { s.classList.add('hidden'); r.classList.remove('hidden'); }
        };
    </script>
</body>
</html>
